<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<meta name="description" content="동건루틴 — 나만의 할 일 · 루틴 · 목표 관리">
<meta name="robots" content="noindex">
<meta name="theme-color" content="#f7f8fa" id="meta-theme">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="default">
<meta name="apple-mobile-web-app-title" content="동건루틴">
<title>동건루틴</title>
<link rel="manifest" href="manifest.webmanifest">
<link rel="icon" type="image/png" href="icons/icon-192.png">
<link rel="apple-touch-icon" href="icons/apple-touch-icon.png">
<style>
/* ============================================================
   동건루틴 — 밝은 미니멀 디자인
   ============================================================ */
*{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent}
:root{
  --bg:#f7f8fa; --card:#ffffff; --card2:#f1f3f5;
  --text:#1a1d21; --sub:#697180; --faint:#9aa3b0; --line:#e7eaee;
  --accent:#10b981; --accent-dark:#059669; --accent-soft:#e6f7f0; --accent-soft2:#d1fae5;
  --red:#ef4444; --red-soft:#fdecec; --amber:#f59e0b; --blue:#3b82f6;
  --violet:#7c5cf0; --violet-soft:#efeafd;
  --heat0:#eceff3; --heat1:#c7ecdb; --heat2:#8edcba; --heat3:#3fc492; --heat4:#0ea472;
  --shadow:0 1px 3px rgba(20,30,40,.06), 0 1px 2px rgba(20,30,40,.04);
  --shadow-lg:0 8px 30px rgba(20,30,40,.12);
  --radius:16px;
  --nav-h:62px;
}
[data-theme="dark"]{
  --bg:#0f1316; --card:#181d22; --card2:#20262c;
  --text:#eaeef1; --sub:#98a3ad; --faint:#5f6a74; --line:#29313a;
  --accent:#2fd39a; --accent-dark:#25b985; --accent-soft:#12332a; --accent-soft2:#154236;
  --red:#f47171; --red-soft:#3a1f22; --amber:#f5b04b; --blue:#6aa5f8;
  --violet:#a78bfa; --violet-soft:#2b2347;
  --heat0:#20262c; --heat1:#12463a; --heat2:#166b52; --heat3:#1c9a70; --heat4:#2fd39a;
  --shadow:0 1px 3px rgba(0,0,0,.3);
  --shadow-lg:0 8px 30px rgba(0,0,0,.5);
}
html{font-size:15px}
body{
  font-family:-apple-system,BlinkMacSystemFont,"Segoe UI","Pretendard","Noto Sans KR","Malgun Gothic","Apple SD Gothic Neo",sans-serif;
  background:var(--bg); color:var(--text); line-height:1.5;
  min-height:100vh; overscroll-behavior-y:none;
  touch-action:manipulation;
}
#nav,.item,.wk-day,.cal-cell,.check,.chip,.seg,.mood,.ms,.goal-card,.more{-webkit-user-select:none;user-select:none}
button{font:inherit;color:inherit;background:none;border:none;cursor:pointer}
input,select,textarea{font:inherit;color:var(--text)}
::placeholder{color:var(--faint)}

/* ---------- 레이아웃 ---------- */
#main{max-width:640px;margin:0 auto;padding:14px 16px calc(var(--nav-h) + env(safe-area-inset-bottom) + 90px)}
.view{display:none}
.view.active{display:block;animation:fadein .18s ease}
@keyframes fadein{from{opacity:.4;transform:translateY(3px)}to{opacity:1;transform:none}}

/* ---------- 하단 내비 (모바일) ---------- */
#nav{
  position:fixed;left:0;right:0;bottom:0;z-index:50;
  background:var(--card);border-top:1px solid var(--line);
  display:flex;justify-content:space-around;
  padding-bottom:env(safe-area-inset-bottom);
}
.nav-btn{
  flex:1;display:flex;flex-direction:column;align-items:center;gap:2px;
  padding:9px 0 7px;color:var(--faint);font-size:.68rem;font-weight:600;
}
.nav-btn svg{width:23px;height:23px}
.nav-btn.active{color:var(--accent-dark)}
[data-theme="dark"] .nav-btn.active{color:var(--accent)}
#nav-logo{display:none}

/* ---------- 데스크톱: 사이드바 ---------- */
@media (min-width:960px){
  :root{--nav-h:0px}
  #nav{
    top:0;bottom:0;right:auto;width:212px;flex-direction:column;justify-content:flex-start;
    border-top:none;border-right:1px solid var(--line);padding:18px 12px;gap:4px;
  }
  #nav-logo{display:flex;align-items:center;gap:8px;font-size:1.15rem;font-weight:800;padding:8px 12px 22px;color:var(--text)}
  .nav-btn{flex:none;flex-direction:row;gap:12px;font-size:.95rem;padding:11px 14px;border-radius:12px;color:var(--sub)}
  .nav-btn.active{background:var(--accent-soft);color:var(--accent-dark)}
  [data-theme="dark"] .nav-btn.active{color:var(--accent)}
  #main{margin-left:212px;max-width:none;padding:26px 40px 60px}
  .desk-cols{display:grid;grid-template-columns:1fr 1fr;gap:18px;align-items:start}
  #main .inner{max-width:860px;margin:0 auto}
}
@media (max-width:959px){ .inner{max-width:100%} }

/* ---------- 공용 컴포넌트 ---------- */
.vhead{display:flex;align-items:flex-end;justify-content:space-between;margin:6px 2px 14px}
.vhead h1{font-size:1.5rem;font-weight:800;letter-spacing:-.02em}
.vhead .sub{color:var(--sub);font-size:.86rem;margin-top:2px}
.vhead .actions{display:flex;gap:8px;align-items:center}
.icon-btn{
  width:38px;height:38px;border-radius:12px;display:flex;align-items:center;justify-content:center;
  background:var(--card);border:1px solid var(--line);color:var(--sub);
}
.icon-btn svg{width:19px;height:19px}
.icon-btn:active{transform:scale(.94)}

.card{background:var(--card);border-radius:var(--radius);box-shadow:var(--shadow);padding:16px;margin-bottom:14px}
.card-title{font-weight:700;font-size:1rem;margin-bottom:12px;display:flex;align-items:center;justify-content:space-between}
.card-title .hint{font-weight:500;font-size:.78rem;color:var(--faint)}

.btn{
  display:inline-flex;align-items:center;justify-content:center;gap:6px;
  padding:11px 18px;border-radius:12px;font-weight:700;font-size:.92rem;
  background:var(--card2);color:var(--text);transition:transform .06s;
}
.btn:active{transform:scale(.97)}
.btn-primary{background:var(--accent);color:#fff}
.btn-primary:active{background:var(--accent-dark)}
.btn-ghost{background:transparent;border:1px solid var(--line);color:var(--sub)}
.btn-danger{background:var(--red-soft);color:var(--red)}
.btn-block{width:100%}
.btn-sm{padding:7px 12px;font-size:.82rem;border-radius:10px}

.seg{display:flex;background:var(--card2);border-radius:12px;padding:3px;gap:2px}
.seg button{flex:1;padding:8px 6px;border-radius:10px;font-size:.86rem;font-weight:600;color:var(--sub);white-space:nowrap}
.seg button.on{background:var(--card);color:var(--text);box-shadow:var(--shadow);font-weight:700}
[data-theme="dark"] .seg button.on{background:#2c343c}

.chip{display:inline-flex;align-items:center;gap:4px;padding:3px 9px;border-radius:99px;font-size:.74rem;font-weight:600;background:var(--card2);color:var(--sub)}
.chip.accent{background:var(--accent-soft);color:var(--accent-dark)}
[data-theme="dark"] .chip.accent{color:var(--accent)}
.chip.red{background:var(--red-soft);color:var(--red)}
.chip.violet{background:var(--violet-soft);color:var(--violet)}

.progress{height:8px;border-radius:99px;background:var(--card2);overflow:hidden}
.progress>div{height:100%;border-radius:99px;background:var(--accent);transition:width .3s ease}

.empty{padding:34px 10px;text-align:center;color:var(--faint);font-size:.9rem;line-height:1.7}
.empty .big{font-size:1.9rem;display:block;margin-bottom:6px}

/* ---------- 주간 스트립 ---------- */
.week-strip{display:flex;align-items:center;gap:4px;margin-bottom:14px}
.week-strip .wk-arrow{width:26px;height:56px;display:flex;align-items:center;justify-content:center;color:var(--faint);flex:none}
.week-days{display:flex;flex:1;gap:4px}
.wk-day{
  flex:1;display:flex;flex-direction:column;align-items:center;gap:3px;
  padding:8px 0 7px;border-radius:13px;border:1.5px solid transparent;
}
.wk-day .dow{font-size:.66rem;font-weight:700;color:var(--faint)}
.wk-day .num{font-size:.95rem;font-weight:700}
.wk-day .mini{width:5px;height:5px;border-radius:99px;background:var(--line)}
.wk-day .mini.some{background:var(--amber)}
.wk-day .mini.all{background:var(--accent)}
.wk-day .mini.none{background:transparent}
.wk-day.sel{background:var(--card);border-color:var(--accent);box-shadow:var(--shadow)}
.wk-day.today .num{color:var(--accent-dark)}
[data-theme="dark"] .wk-day.today .num{color:var(--accent)}
.wk-day.sun .dow{color:#e0705f}

/* ---------- 오늘 요약 ---------- */
.today-sum{display:flex;align-items:center;gap:16px}
.today-sum .ring-wrap{flex:none}
.today-sum .ts-main{font-size:1.05rem;font-weight:800}
.today-sum .ts-sub{font-size:.82rem;color:var(--sub);margin-top:3px}
.today-sum .ts-streak{margin-top:7px}

.ring{transform:rotate(-90deg)}
.ring .track{stroke:var(--card2)}
.ring .bar{stroke:var(--accent);stroke-linecap:round;transition:stroke-dashoffset .4s ease}
.ring-txt{font-weight:800;fill:var(--text)}

/* ---------- 섹션 ---------- */
.sec-head{display:flex;align-items:center;justify-content:space-between;margin:20px 4px 9px}
.sec-head h2{font-size:.95rem;font-weight:800;display:flex;gap:6px;align-items:center}
.sec-head .cnt{color:var(--faint);font-weight:600;font-size:.82rem}
.sec-head button{color:var(--sub);font-size:.8rem;font-weight:600;padding:4px 8px;border-radius:8px;background:var(--card2)}

/* ---------- 아이템 (할 일 / 루틴) ---------- */
.item{
  display:flex;align-items:flex-start;gap:11px;
  background:var(--card);border-radius:14px;box-shadow:var(--shadow);
  padding:12px 12px 12px 14px;margin-bottom:8px;cursor:pointer;
  border-left:3px solid transparent;
}
.item.p2{border-left-color:var(--red)}
.item.p0{border-left-color:transparent}
.item.p1{border-left-color:var(--amber)}
.item.routine{border-left-color:var(--blue)}
.check{
  flex:none;width:24px;height:24px;margin-top:1px;border-radius:8px;
  border:2px solid var(--line);display:flex;align-items:center;justify-content:center;
  color:transparent;font-size:.8rem;font-weight:900;transition:all .12s;
  position:relative;
}
.check::after{content:'';position:absolute;inset:-10px}  /* 터치 영역 확대 */
.item.routine .check{border-radius:99px}
.item.done .check{background:var(--accent);border-color:var(--accent);color:#fff}
.item-body{flex:1;min-width:0}
.item-title{font-weight:600;font-size:.95rem;word-break:break-word}
.item.done .item-title{color:var(--faint);text-decoration:line-through}
.item-meta{display:flex;flex-wrap:wrap;gap:5px;margin-top:5px;align-items:center}
.item-meta:empty{display:none}
.subbar{display:flex;align-items:center;gap:7px;margin-top:7px}
.subbar .progress{flex:1;height:5px}
.subbar span{font-size:.7rem;color:var(--faint);font-weight:700}
.more{flex:none;color:var(--faint);width:30px;height:30px;border-radius:9px;font-size:1.05rem;letter-spacing:.5px}
.more:active{background:var(--card2)}
.overdue-box{background:var(--red-soft);border-radius:var(--radius);padding:12px;margin-bottom:14px}
.overdue-box .ob-title{font-weight:800;font-size:.88rem;color:var(--red);margin-bottom:8px}
.overdue-box .item{box-shadow:none;margin-bottom:6px}
.ob-actions{display:flex;gap:6px;flex:none;align-self:center}

/* ---------- 회고 ---------- */
.moods{display:flex;gap:6px;margin-bottom:10px}
.mood{
  flex:1;font-size:1.35rem;padding:7px 0;border-radius:12px;background:var(--card2);
  filter:grayscale(1);opacity:.55;transition:all .15s;
}
.mood.on{background:var(--accent-soft);filter:none;opacity:1;transform:scale(1.08)}
.refl-row{display:flex;gap:8px}
.refl-row input{flex:1;border:1.5px solid var(--line);border-radius:12px;padding:10px 13px;font-size:16px;background:var(--card)}
.refl-row input:focus{outline:none;border-color:var(--accent)}
.refl-done{display:flex;align-items:center;gap:10px}
.refl-done .emoji{font-size:1.7rem}
.refl-done .txt{flex:1;font-size:.92rem;color:var(--text);word-break:break-word}

/* ---------- 달력 ---------- */
.cal-head{display:flex;align-items:center;justify-content:space-between;margin-bottom:10px}
.cal-head .cal-title{font-size:1.12rem;font-weight:800}
.cal-head .cal-nav{display:flex;gap:6px;align-items:center}
.cal-grid{display:grid;grid-template-columns:repeat(7,1fr);gap:3px}
.cal-dow{text-align:center;font-size:.68rem;font-weight:700;color:var(--faint);padding:4px 0}
.cal-dow.sun{color:#e0705f}
.cal-cell{
  position:relative;aspect-ratio:.82;border-radius:11px;border:1.5px solid transparent;
  display:flex;flex-direction:column;align-items:center;padding-top:6px;gap:2px;
}
.cal-cell .n{font-size:.83rem;font-weight:700}
.cal-cell.dim .n{color:var(--faint);opacity:.5}
.cal-cell.sunday:not(.dim) .n{color:#e0705f}
.cal-cell.today{border-color:var(--accent)}
.cal-cell.sel{background:var(--accent);border-color:var(--accent)}
.cal-cell.sel .n,.cal-cell.sel .cal-mood{color:#fff}
.cal-cell.alldone:not(.sel){background:var(--accent-soft)}
.cal-dots{display:flex;gap:2.5px;height:5px}
.cal-dots i{width:5px;height:5px;border-radius:99px;background:var(--faint);opacity:.5}
.cal-dots i.d{background:var(--accent);opacity:1}
.cal-cell.sel .cal-dots i{background:rgba(255,255,255,.6)}
.cal-cell.sel .cal-dots i.d{background:#fff}
.cal-mood{font-size:.62rem;line-height:1}
.cal-detail-date{font-weight:800;font-size:1.02rem;margin:18px 4px 10px}

/* ---------- 목표 ---------- */
.goal-card{cursor:pointer}
.goal-top{display:flex;align-items:flex-start;justify-content:space-between;gap:8px;margin-bottom:9px}
.goal-title{font-weight:700;font-size:1rem;word-break:break-word}
.goal-card.gdone .goal-title{color:var(--faint);text-decoration:line-through}
.dday{flex:none}
.goal-pct{display:flex;align-items:center;gap:10px;margin-top:9px}
.goal-pct .progress{flex:1}
.goal-pct b{font-size:.86rem;min-width:38px;text-align:right}
.goal-meta{margin-top:8px;font-size:.78rem;color:var(--sub);display:flex;flex-wrap:wrap;gap:10px}
.ms-list{margin-top:10px;display:flex;flex-direction:column;gap:5px}
.ms{
  display:flex;align-items:center;gap:9px;padding:8px 10px;border-radius:10px;
  background:var(--card2);font-size:.87rem;font-weight:500;text-align:left;
}
.ms .msq{
  flex:none;width:17px;height:17px;border-radius:6px;border:2px solid var(--faint);
  display:flex;align-items:center;justify-content:center;color:transparent;font-size:.6rem;font-weight:900;
}
.ms.on .msq{background:var(--accent);border-color:var(--accent);color:#fff}
.ms.on{color:var(--faint);text-decoration:line-through}
.goal-sum{display:flex;align-items:center;gap:12px}
.goal-sum .gs-txt{font-size:.85rem;color:var(--sub)}
.goal-sum .gs-txt b{color:var(--text)}

/* ---------- 자산(포트폴리오) ---------- */
.pf-hero{
  background:linear-gradient(135deg,var(--accent) 0%,var(--accent-dark) 100%);
  color:#fff;border-radius:var(--radius);padding:20px 18px;margin-bottom:14px;
  box-shadow:0 6px 22px rgba(16,185,129,.28);
}
.pf-hero .pf-label{font-size:.82rem;opacity:.85;font-weight:600}
.pf-hero .pf-total{font-size:1.95rem;font-weight:800;letter-spacing:-.5px;margin-top:2px;line-height:1.15}
.pf-hero .pf-secondary{font-size:.78rem;opacity:.82;margin-top:4px;line-height:1.5}
.pf-stats{display:grid;grid-template-columns:1fr 1fr 1fr;gap:8px;margin-top:16px}
.pf-stats .ps{background:rgba(255,255,255,.14);border-radius:12px;padding:9px 10px}
.pf-stats .ps .k{font-size:.68rem;opacity:.85;font-weight:600}
.pf-stats .ps .v{font-size:.94rem;font-weight:800;margin-top:3px;white-space:nowrap}
.pf-goalbar{margin-top:14px}
.pf-goalbar .pg-head{display:flex;justify-content:space-between;align-items:center;font-size:.78rem;font-weight:600;margin-bottom:6px}
.pf-goalbar .pg-track{height:9px;border-radius:99px;background:rgba(255,255,255,.25);overflow:hidden}
.pf-goalbar .pg-fill{height:100%;border-radius:99px;background:#fff;transition:width .4s ease}
.pf-goalbar .pg-sub{font-size:.72rem;opacity:.85;margin-top:5px}
.pf-goalbar .pg-edit{color:#fff;text-decoration:underline;font-weight:700;font-size:.78rem;opacity:.95}
.pf-stack{display:flex;height:14px;border-radius:99px;overflow:hidden;margin-bottom:14px;background:var(--card2)}
.pf-stack>span{height:100%}
.wbars{display:flex;flex-direction:column;gap:11px}
.wbar-row{display:flex;align-items:center;gap:10px}
.wbar-row .wdot{width:11px;height:11px;border-radius:4px;flex:none}
.wbar-row .wname{font-size:.86rem;font-weight:600;flex:none;width:74px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.wbar-row .wtrack{flex:1;height:8px;border-radius:99px;background:var(--card2);overflow:hidden}
.wbar-row .wtrack>div{height:100%;border-radius:99px;transition:width .4s ease}
.wbar-row .wpct{font-size:.8rem;font-weight:700;width:44px;text-align:right;flex:none}
.wbar-row .wval{font-size:.72rem;color:var(--sub);width:64px;text-align:right;flex:none}
.pf-div-grid{display:grid;grid-template-columns:1fr 1fr;gap:10px}
.pf-div-box{background:var(--card2);border-radius:12px;padding:12px}
.pf-div-box .k{font-size:.72rem;color:var(--sub);font-weight:600}
.pf-div-box .v{font-size:1.12rem;font-weight:800;margin-top:4px}
.pf-div-box .s{font-size:.7rem;color:var(--faint);margin-top:3px}
.pf-note{font-size:.74rem;color:var(--faint);line-height:1.7;text-align:center;margin-top:2px}
/* 보유 종목 리스트 */
.hold-row{display:flex;align-items:center;gap:8px;padding:11px 0 12px;position:relative;cursor:pointer}
.hold-row+.hold-row,.hold-detail+.hold-row{border-top:1px solid var(--line)}
.h-icon{width:32px;height:32px;border-radius:9px;flex:none;display:flex;align-items:center;justify-content:center;
  color:#fff;font-size:.58rem;font-weight:800;letter-spacing:-.3px}
.h-main{flex:1;min-width:0}
.h-name{font-size:.9rem;font-weight:700;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.h-sub{font-size:.7rem;color:var(--sub);margin-top:2px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.h-val{text-align:right;flex:none;min-width:84px}
.h-val .now{font-size:.88rem;font-weight:800}
.h-val .sub{font-size:.68rem;color:var(--sub);margin-top:2px}
.h-wt{text-align:right;flex:none;min-width:62px}
.h-wt .pl{font-size:.84rem;font-weight:800}
.h-wt .pl2{font-size:.68rem;font-weight:700;margin-top:2px;opacity:.9}
.h-wt .up,.hold-detail .up{color:var(--red)}
.h-wt .down,.hold-detail .down{color:var(--blue)}
.hold-detail{background:var(--card2);border-radius:12px;padding:11px 13px;margin:0 0 12px;display:grid;grid-template-columns:1fr 1fr;gap:7px 16px}
.hold-detail span{display:flex;justify-content:space-between;gap:8px;font-size:.75rem;min-width:0}
.hold-detail i{font-style:normal;color:var(--sub);flex:none}
.hold-detail b{font-weight:700;text-align:right;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.hold-sort{display:flex;gap:2px}
.hold-sort button{padding:6px 10px;font-size:.76rem;font-weight:600;color:var(--sub);border-radius:9px}
.hold-sort button.on{background:var(--accent-soft);color:var(--accent-dark);font-weight:700}
[data-theme="dark"] .hold-sort button.on{color:var(--accent)}
/* 배당 카드 */
.div-hero{padding:2px 2px 0}
.div-hero .k{font-size:.74rem;color:var(--sub);font-weight:600}
.div-hero .v{font-size:1.5rem;font-weight:800;letter-spacing:-.3px;margin-top:2px;color:var(--accent-dark)}
[data-theme="dark"] .div-hero .v{color:var(--accent)}
.div-hero .s{font-size:.72rem;color:var(--faint);margin-top:3px}
.sec-sub{display:flex;justify-content:space-between;align-items:baseline;gap:8px;margin:17px 2px 8px;font-size:.85rem;font-weight:800}
.sec-sub span{font-size:.7rem;color:var(--sub);font-weight:600;text-align:right}
.div-cal{display:flex;align-items:flex-end;gap:3px;height:106px;padding-top:15px}

<script>
'use strict';
/* ============================================================
   동건루틴 v1.0 — 할 일 · 루틴 · 목표 · 통계 · 공유
   데이터는 이 기기(localStorage)에만 저장됩니다.
   ============================================================ */
const APP_VERSION = '1.5.0';
const LS_KEY = 'dgr_data';
const MOODS = ['😄','🙂','😐','😕','😢'];
const KD = ['일','월','화','수','목','금','토'];
const PRI = ['낮음','보통','높음'];
const TYPE_NAME = { month:'월간', quarter:'분기', year:'연간' };

/* ---------- 유틸 ---------- */
const $  = s => document.querySelector(s);
const $$ = s => [...document.querySelectorAll(s)];
const esc = s => String(s ?? '').replace(/[&<>"']/g, c => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c]));
const uid = () => (crypto.randomUUID ? crypto.randomUUID() : 'id-' + Date.now() + '-' + Math.random().toString(36).slice(2, 9));
const vib = () => { try { navigator.vibrate && navigator.vibrate(8); } catch (e) {} };

/* ---------- 날짜 ---------- */
const pad = n => String(n).padStart(2, '0');
const fmtDate = d => `${d.getFullYear()}-${pad(d.getMonth() + 1)}-${pad(d.getDate())}`;
const parseDate = s => { const [y, m, d] = s.split('-').map(Number); return new Date(y, m - 1, d); };
const todayStr = () => fmtDate(new Date());
const addDays = (s, n) => { const d = parseDate(s); d.setDate(d.getDate() + n); return fmtDate(d); };
const diffDays = (a, b) => Math.round((parseDate(b) - parseDate(a)) / 86400000);
const dow = s => parseDate(s).getDay();
const fmtKo = s => { const d = parseDate(s); return `${d.getMonth() + 1}월 ${d.getDate()}일 ${KD[d.getDay()]}요일`; };
const fmtKoShort = s => { const d = parseDate(s); return `${d.getMonth() + 1}/${d.getDate()}`; };

function weekDates(s) {
  const ws = S.settings.weekStart;
  const off = (dow(s) - ws + 7) % 7;
  const start = addDays(s, -off);
  return Array.from({ length: 7 }, (_, i) => addDays(start, i));
}
function* dateRange(a, b) { let d = a; while (d <= b) { yield d; d = addDays(d, 1); } }

/* ---------- 기간(월/분기/연) ---------- */
const monthKeyOf = s => s.slice(0, 7);
const quarterKeyOf = s => `${s.slice(0, 4)}-Q${Math.floor((+s.slice(5, 7) - 1) / 3) + 1}`;
const yearKeyOf = s => s.slice(0, 4);
const curKey = type => ({ month: monthKeyOf(todayStr()), quarter: quarterKeyOf(todayStr()), year: yearKeyOf(todayStr()) }[type]);

function periodRange(type, key) {
  if (type === 'month') {
    const [y, m] = key.split('-').map(Number);
    return { start: `${y}-${pad(m)}-01`, end: fmtDate(new Date(y, m, 0)) };
  }
  if (type === 'quarter') {
    const y = +key.slice(0, 4), q = +key.slice(6);
    const m1 = (q - 1) * 3 + 1;
    return { start: `${y}-${pad(m1)}-01`, end: fmtDate(new Date(y, m1 + 2, 0)) };
  }
  return { start: `${key}-01-01`, end: `${key}-12-31` };
}
function periodLabel(type, key) {
  if (type === 'month') { const [y, m] = key.split('-'); return `${y}년 ${+m}월`; }
  if (type === 'quarter') return `${key.slice(0, 4)}년 ${key.slice(6)}분기`;
  return `${key}년`;
}
function periodShift(type, key, delta) {
  if (type === 'month') { const [y, m] = key.split('-').map(Number); const d = new Date(y, m - 1 + delta, 1); return `${d.getFullYear()}-${pad(d.getMonth() + 1)}`; }
  if (type === 'quarter') { let y = +key.slice(0, 4), q = +key.slice(6) + delta; while (q > 4) { q -= 4; y++; } while (q < 1) { q += 4; y--; } return `${y}-Q${q}`; }
  return String(+key + delta);
}
function ddayLabel(type, key) {
  const { start, end } = periodRange(type, key);
  const t = todayStr();
  if (t > end) return { txt: '기간 종료', cls: '' };
  if (t < start) return { txt: `시작 D-${diffDays(t, start)}`, cls: '' };
  const n = diffDays(t, end);
  return { txt: n === 0 ? 'D-DAY' : `D-${n}`, cls: n <= 7 ? 'red' : 'accent' };
}

/* ---------- 저장소 ---------- */
const DEFAULT_DATA = () => ({
  version: 1,
  meta: { firstUse: todayStr() },
  settings: { theme: 'auto', weekStart: 0, name: '동건', lastBackup: null },
  todos: [],
  routines: [],

  let total = 0, done = 0, activeDays = 0, reflDays = 0;
  if (start > e) return { total, done, activeDays, reflDays, rate: 0 };
  for (const d of dateRange(start, e)) {
    const s = dayStats(d);
    total += s.total; done += s.done;
    if (s.done > 0) activeDays++;
    if (S.reflections[d]) reflDays++;

  return { total, done, activeDays, reflDays, rate: total ? Math.round(done / total * 100) : 0 };
}
function rCurStreak(r) {
  let d = todayStr(), n = 0;
  if (r.days.includes(dow(d)) && !isRDone(r.id, d)) d = addDays(d, -1); // 오늘 아직 안 했으면 어제부터
  const limit = r.startDate || '2000-01-01';
  for (let i = 0; i < 3700 && d >= limit; i++) {
    if (r.days.includes(dow(d))) { if (isRDone(r.id, d)) n++; else break; }
    d = addDays(d, -1);

}
function rBestStreak(r) {
  const dates = Object.keys(S.routineLog).filter(d => isRDone(r.id, d)).sort();
  if (!dates.length) return 0;
  let best = 0, cur = 0, prev = null;
  for (const d of dates) {
    if (prev) {

      let ok = true;

      cur = ok ? cur + 1 : 1;

    best = Math.max(best, cur); prev = d;
  }

}

function metricProg(m) {

function trackerEntries(tk, fromD, toD) {
  const out = [];
  for (const d in S.trackerLog) {
    if (d < fromD || d > toD) continue;
    const v = S.trackerLog[d][tk.id];
    if (v !== undefined) out.push({ d, v });
  }
  return out.sort((a, b) => a.d.localeCompare(b.d));
}
function lastTrackerEntry(tk) {
  let best = null;
  for (const d in S.trackerLog) {
    if (S.trackerLog[d][tk.id] !== undefined && (!best || d > best.d)) best = { d, v: S.trackerLog[d][tk.id] };
  }
  return best;
}

let toastTimer = null;

  const t = $('#toast');

  clearTimeout(toastTimer);
  toastTimer = setTimeout(() => t.classList.remove('show'), 2200);
}
function openModal(html) {
  const root = $('#modal-root');
  root.innerHTML = `<div class="overlay" data-action="close-modal"></div><div class="sheet"><div class="grip"></div>${html}</div>`;
  root.classList.add('open');
  document.body.style.overflow = 'hidden';
}
function closeModal() {
  const root = $('#modal-root');
  root.classList.remove('open');
  root.innerHTML = '';
  document.body.style.overflow = '';
}
function confirmDlg(title, msg, { danger = false, ok = '확인' } = {}) {
  return new Promise(res => {
    openModal(`
      <div class="m-title">${esc(title)}</div>
      <p style="color:var(--sub);font-size:.92rem;margin:-6px 0 4px;white-space:pre-line">${esc(msg)}</p>
      <div class="m-actions">
        <button class="btn" id="cf-no">취소</button>
        <button class="btn ${danger ? 'btn-danger' : 'btn-primary'}" id="cf-ok" style="flex:1">${esc(ok)}</button>
      </div>`);
    $('#cf-no').onclick = () => { closeModal(); res(false); };
    $('#cf-ok').onclick = () => { closeModal(); res(true); };
  });
}

function ringHTML(pct, size = 72, stroke = 7, fs = '.95rem') {
  const r = (size - stroke) / 2, c = 2 * Math.PI * r;
  const off = c * (1 - Math.min(100, pct) / 100);
  return `<svg class="ring" width="${size}" height="${size}" viewBox="0 0 ${size} ${size}">
    <circle class="track" cx="${size / 2}" cy="${size / 2}" r="${r}" fill="none" stroke-width="${stroke}"/>
    <circle class="bar" cx="${size / 2}" cy="${size / 2}" r="${r}" fill="none" stroke-width="${stroke}"
      stroke-dasharray="${c}" stroke-dashoffset="${off}"/>
    <text class="ring-txt" x="50%" y="53%" dominant-baseline="middle" text-anchor="middle"
      transform="rotate(90 ${size / 2} ${size / 2})" style="font-size:${fs}">${pct}%</text>
  </svg>`;
}

    t.priority === 2 ? `<span class="chip red">높음</span>` : '',
    ...(t.tags || []).map(tag => `<span class="chip"># ${esc(tag)}</span>`),
    g ? `<span class="chip">🎯 ${esc(g.title.length > 10 ? g.title.slice(0, 10) + '…' : g.title)}</span>` : '',
    t.memo ? `<span class="chip">📝</span>` : ''
  ].filter(Boolean).join('');

    <div class="subbar"><div class="progress"><div style="width:${subs.length ? subDone / subs.length * 100 : 0}%"></div></div><span>${subDone}/${subs.length}</span></div>` : '';

function routineItemHTML(r, d) {
  const done = isRDone(r.id, d);
  const stk = rCurStreak(r);
  const future = d > todayStr();
  return `<div class="item routine ${done ? 'done' : ''}" data-action="edit-routine" data-id="${r.id}">
    <button class="check" data-action="toggle-routine" data-id="${r.id}" data-date="${d}" ${future ? 'disabled style="opacity:.35"' : ''} aria-label="완료">✓</button>
    <div class="item-body">
      <div class="item-title">${esc(r.title)}</div>
      <div class="item-meta">
        ${r.time ? `<span class="chip accent">🕐 ${r.time}</span>` : ''}

    </div>

}
function trackerRowHTML(tk, d) {
  const v = trackerVal(tk.id, d);
  const has = v !== undefined;
  const raw = !has ? '' : tk.type === 'number' ? `${fmtNum(v)}${tk.unit ? ' ' + tk.unit : ''}` : String(v).replace(/\n/g, ' ');
  const shown = raw.length > 34 ? raw.slice(0, 34) + '…' : raw;
  return `<div class="item tracker" data-action="log-tracker" data-id="${tk.id}" data-date="${d}">
    <span class="tk-emoji">${esc(tk.emoji || '📊')}</span>
    <div class="item-body">
      <div class="item-title">${esc(tk.name)}</div>
      <div class="item-meta">
        ${has ? `<span class="chip violet">${esc(shown)}</span>` : `<span class="chip">기록 없음 — 눌러서 기록</span>`}
        ${tk.type === 'number' && tk.target != null ? `<span class="chip">🎯 ${fmtNum(tk.target)}${tk.unit ? ' ' + esc(tk.unit) : ''}</span>` : ''}
      </div>
    </div>
    <span class="tk-go">›</span>
  </div>`;
}
function sortTodos(list) {
  return [...list].sort((a, b) =>
    (a.done - b.done) ||
    ((a.time || '99:99') > (b.time || '99:99') ? 1 : (a.time || '99:99') < (b.time || '99:99') ? -1 : 0) ||
    (b.priority - a.priority) ||
    (a.createdAt || '').localeCompare(b.createdAt || ''));
}
function reflHTML(d) {
  const ref = S.reflections[d];
  const future = d > todayStr();
  if (future) return '';
  const moodBtns = MOODS.map((m, i) =>
    `<button class="mood ${ref && ref.mood === i ? 'on' : ''}" data-action="mood" data-date="${d}" data-mood="${i}">${m}</button>`).join('');
  return `<div class="card">
    <div class="card-title">하루 회고 <span class="hint">${d === todayStr() ? '오늘 하루는 어땠나요?' : fmtKoShort(d)}</span></div>
    <div class="moods">${moodBtns}</div>
    <div class="refl-row">

      <button class="btn btn-primary btn-sm" data-action="save-refl" data-date="${d}" style="padding:10px 16px">저장</button>
    </div>
  </div>`;
}

function saveReflection(d) {
  const input = $('#refl-text');
  const text = input ? input.value.trim() : '';
  const cur = S.reflections[d] || {};
  if (!text && cur.mood == null) { toast('기분이나 한 줄을 남겨보세요'); return; }
  S.reflections[d] = { mood: cur.mood ?? null, text };
  save(); render();
  toast('회고를 저장했어요 ✍️');
}

function monthGridDates(key) {
  const [y, m] = key.split('-').map(Number);
  const first = new Date(y, m - 1, 1);
  const ws = S.settings.weekStart;
  const off = (first.getDay() - ws + 7) % 7;
  let start = fmtDate(new Date(y, m - 1, 1 - off));
  const cells = [];
  for (let i = 0; i < 42; i++) cells.push(addDays(start, i));
  while (cells.length > 7 && monthKeyOf(cells[cells.length - 7]) !== key) cells.splice(-7);
  return cells;
}
function renderCalendar() {
  const key = V.calMonth, sel = V.calSel;
  const [y, m] = key.split('-').map(Number);
  const ws = S.settings.weekStart;
  const dows = Array.from({ length: 7 }, (_, i) => (ws + i) % 7);
  const cells = monthGridDates(key).map(d => {
    const inMonth = monthKeyOf(d) === key;
    const st = dayStats(d);
    const ref = S.reflections[d];
    const dots = st.total ? Array.from({ length: Math.min(st.total, 3) }, (_, i) =>
      `<i class="${i < st.done ? 'd' : ''}"></i>`).join('') : '';
    return `<button class="cal-cell ${inMonth ? '' : 'dim'} ${d === todayStr() ? 'today' : ''} ${d === sel ? 'sel' : ''} ${dow(d) === 0 ? 'sunday' : ''} ${st.total > 0 && st.done >= st.total ? 'alldone' : ''}"
      data-action="cal-day" data-date="${d}">

  // 선택일 상세
  const ts = sortTodos(todosOf(sel));

  const ref = S.reflections[sel];
  const detail = `
    <div class="cal-detail-date">${fmtKo(sel)}

      ${ref && ref.text ? `<span style="font-weight:500;color:var(--sub);font-size:.85rem"> — ${esc(ref.text)}</span>` : ''}
    </div>
    ${rs.length ? rs.map(r => routineItemHTML(r, sel)).join('') : ''}
    ${ts.length ? ts.map(x => todoHTML(x)).join('') : ''}
    ${!rs.length && !ts.length ? `<div class="card empty">이 날의 일정이 없어요</div>` : ''}
    ${activeTrackers().map(tk => trackerRowHTML(tk, sel)).join('')}
    <button class="btn btn-block btn-ghost" data-action="add-todo-date" data-date="${sel}" style="margin-top:4px">＋ 이 날짜에 할 일 추가</button>
    ${sel <= todayStr() ? reflHTML(sel) : ''}
  `;

  $('[data-view=calendar]').innerHTML = `
    <div class="vhead"><div><h1>달력</h1></div>
      <div class="actions"><button class="icon-btn" data-action="open-search" aria-label="검색">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><circle cx="11" cy="11" r="7"/><path d="M21 21l-4.3-4.3"/></svg>
      </button></div></div>
    <div class="desk-cols"><div class="card">
      <div class="cal-head">
        <div class="cal-title">${y}년 ${m}월</div>
        <div class="cal-nav">
          <button class="icon-btn" data-action="cal-nav" data-d="-1">‹</button>
          <button class="btn btn-sm btn-ghost" data-action="cal-today">오늘</button>
          <button class="icon-btn" data-action="cal-nav" data-d="1">›</button>
        </div>
      </div>
      <div class="cal-grid">
        ${dows.map(i => `<div class="cal-dow ${i === 0 ? 'sun' : ''}">${KD[i]}</div>`).join('')}
        ${cells}
      </div>

    <div>${detail}</div></div>

  const ri = $('#refl-text');
  if (ri) ri.addEventListener('keydown', e => { if (e.key === 'Enter') { e.preventDefault(); saveReflection(sel); } });
}

/* ============================================================
   자산(포트폴리오) 뷰 — 내 포트폴리오 첫 화면 요약
   ============================================================ */
function renderAssets() {
  const pf = computePortfolio();
  const cur = V.assetCur;
  const M = usd => pfMoney(usd, cur);
  // 좁은 칸용 축약(억/만) 표기
  const compact = usd => {
    if (cur === 'USD') return (usd < 0 ? '-$' : '$') + Math.round(Math.abs(usd)).toLocaleString('en-US');
    const krw = usd * pf.fx, a = Math.abs(krw), sg = krw < 0 ? '-' : '';
    if (a >= 1e8) return `${sg}₩${(Math.round(a / 1e6) / 100).toLocaleString('en-US')}억`;
    return `${sg}₩${Math.round(a / 1e4).toLocaleString('en-US')}만`;
  };
  const other = cur === 'KRW' ? pfMoney(pf.totalUSD, 'USD') : pfMoney(pf.totalUSD, 'KRW');
  const signed = usd => (usd >= 0 ? '+' : '') + compact(usd);
  const staleDays = diffDays(pf.asOf, todayStr());

  // 자산 목표(포트폴리오 연동) — 있으면 진행바, 없으면 만들기 유도
  const assetGoals = S.goals.filter(g => !g.done && g.metric && g.metric.link === 'assets')
    .sort((a, b) => periodRange(a.type, a.period).end.localeCompare(periodRange(b.type, b.period).end));
  const ag = assetGoals[0];
  let goalHTML;
  if (ag) {
    const p = goalProg(ag), tgtUSD = pfUnitToUSD(ag.metric.target, ag.metric.unit);
    const remainUSD = Math.max(0, tgtUSD - pf.totalUSD);
    goalHTML = `<div class="pf-goalbar">
      <div class="pg-head"><span>🎯 ${esc(ag.title)}</span>
        <button class="pg-edit" data-action="edit-goal" data-id="${ag.id}">${p}% ✎</button></div>
      <div class="pg-track"><div class="pg-fill" style="width:${Math.min(100, p)}%"></div></div>
      <div class="pg-sub">${p >= 100 ? '🎉 목표 달성!' : `목표 ${compact(tgtUSD)} · ${compact(remainUSD)} 남음`}</div>
    </div>`;
  } else {
    goalHTML = `<div class="pf-goalbar"><button class="pg-edit" data-action="new-asset-goal" style="text-decoration:none">🎯 자산 목표 세우기 →</button></div>`;
  }

function statsRangeOf(k) {
  const t = todayStr();
  if (k === 'week') { const w = weekDates(t); return { start: w[0], end: w[6], label: '이번 주' }; }
  if (k === 'month') { const r = periodRange('month', monthKeyOf(t)); return { ...r, label: '이번 달' }; }
  const r = periodRange('year', yearKeyOf(t)); return { ...r, label: '올해' };
}
function heatmapHTML() {
  const year = +yearKeyOf(todayStr());
  const ws = S.settings.weekStart;
  const jan1 = `${year}-01-01`, dec31 = `${year}-12-31`;
  const off = (dow(jan1) - ws + 7) % 7;
  let d = addDays(jan1, -off);
  const cols = [];
  const monthMarks = [];
  while (d <= dec31) {
    const col = [];
    let label = '';
    for (let i = 0; i < 7; i++) {
      if (d < jan1 || d > dec31) col.push('<span class="heat-cell" style="visibility:hidden"></span>');
      else if (d > todayStr()) col.push('<span class="heat-cell future"></span>');
      else {
        const st = dayStats(d);
        col.push(`<span class="heat-cell h${heatLevel(st.done)}" title="${d} · ${st.done}개 완료"></span>`);
      }
      if (d.slice(8) === '01' && d >= jan1 && d <= dec31) label = `${+d.slice(5, 7)}월`;
      d = addDays(d, 1);
    }
    monthMarks.push(label);
    cols.push(`<div class="heat-col">${col.join('')}</div>`);
  }
  const monthRow = monthMarks.map(l => `<span style="width:13px;flex:none">${l ? `<span style="position:absolute">${l}</span>` : ''}</span>`).join('');
  return `<div class="heat-wrap" id="heat-scroll">
    <div class="heat-months" style="position:relative;height:14px">${monthRow}</div>
    <div class="heatmap">${cols.join('')}</div>
  </div>
  <div class="heat-legend">적음 <span class="heat-cell"></span><span class="heat-cell h1"></span><span class="heat-cell h2"></span><span class="heat-cell h3"></span><span class="heat-cell h4"></span> 많음</div>`;
}
function barsHTML() {
  const t = todayStr();
  const thisWeekStart = weekDates(t)[0];
  const weeks = [];
  for (let i = 11; i >= 0; i--) {
    const s = addDays(thisWeekStart, -7 * i);
    const st = rangeStats(s, addDays(s, 6));
    weeks.push({ s, rate: st.rate, has: st.total > 0, cur: i === 0 });
  }
  return `<div class="bars">${weeks.map(w => `
    <div class="bar ${w.cur ? 'cur' : ''}">
      <span class="bv">${w.has ? w.rate : ''}</span>
      <div class="bi" style="height:${w.has ? Math.max(4, w.rate) : 2}%"></div>
      <span class="bl">${fmtKoShort(w.s)}</span>
    </div>`).join('')}</div>`;
}

  `;
  const hs = $('#heat-scroll');
  if (hs) hs.scrollLeft = Math.max(0, hs.scrollWidth * (new Date().getMonth() / 12) - 60);
}

function trackerStatsCardHTML() {
  const tks = activeTrackers();
  if (!tks.length) return '';
  const t = todayStr(), from = addDays(t, -29);
  const blocks = tks.map(tk => {
    const es = trackerEntries(tk, from, t);
    if (tk.type === 'text' || es.length < 2) {
      return `<div class="tk-block" style="display:flex;align-items:center;gap:10px">
        <span style="flex:none">${esc(tk.emoji || '📊')}</span>
        <span style="flex:1;font-size:.9rem;font-weight:600">${esc(tk.name)}</span>
        <span style="font-size:.78rem;color:var(--sub)">최근 30일 ${es.length}회 · 전체 ${trackerDayCount(tk)}회</span>
      </div>`;
    }
    const vs = es.map(e => +e.v);
    const realMin = Math.min(...vs), realMax = Math.max(...vs);
    let lo = realMin, hi = realMax;
    if (tk.target != null) { lo = Math.min(lo, +tk.target); hi = Math.max(hi, +tk.target); }
    if (lo === hi) { lo -= 1; hi += 1; }
    const pad = (hi - lo) * 0.12; lo -= pad; hi += pad;
    const W = 330, H = 74, P = 7;
    const span = Math.max(1, diffDays(es[0].d, es[es.length - 1].d));
    const x = d => P + diffDays(es[0].d, d) / span * (W - 2 * P);
    const y = v => H - P - (v - lo) / (hi - lo) * (H - 2 * P);
    const pts = es.map(e => `${x(e.d).toFixed(1)},${y(+e.v).toFixed(1)}`).join(' ');
    const last = es[es.length - 1];
    const diff = Math.round((+last.v - +es[0].v) * 100) / 100;
    return `<div class="tk-block">
      <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:3px">
        <span style="font-size:.9rem;font-weight:700">${esc(tk.emoji || '')} ${esc(tk.name)}</span>
        <span style="font-size:.82rem;color:var(--sub)">최근 <b style="color:var(--text)">${fmtNum(last.v)}${tk.unit ? ' ' + esc(tk.unit) : ''}</b></span>
      </div>
      <svg class="spark" viewBox="0 0 ${W} ${H}" preserveAspectRatio="none" style="height:74px">
        ${tk.target != null ? `<line class="goal-line" x1="${P}" x2="${W - P}" y1="${y(+tk.target).toFixed(1)}" y2="${y(+tk.target).toFixed(1)}"/>` : ''}
        <polyline points="${pts}"/>
        <circle class="dot" cx="${x(last.d).toFixed(1)}" cy="${y(+last.v).toFixed(1)}" r="3.2"/>
      </svg>
      <div class="tk-stat-row">
        <span>최소 <b>${fmtNum(realMin)}</b></span><span>최대 <b>${fmtNum(realMax)}</b></span>
        <span>30일 변화 <b>${diff > 0 ? '+' : ''}${fmtNum(diff)}</b></span>
        ${tk.target != null ? `<span>🎯 목표 <b>${fmtNum(tk.target)}</b></span>` : ''}
      </div>
    </div>`;
  }).join('');
  return `<div class="card"><div class="card-title">📊 기록 추이 <span class="hint">최근 30일</span></div>${blocks}</div>`;
}

   모달: 할 일
   ============================================================ */
function subLineHTML(st = { id: uid(), title: '', done: false }) {
  return `<div class="sub-line ${st.done ? 'on' : ''}" data-sid="${st.id}" data-done="${st.done ? 1 : 0}">
    <button class="msq-btn" data-action="modal-sub-toggle" type="button">✓</button>
    <input placeholder="세부 단계" value="${esc(st.title)}" maxlength="60">
    <button class="rm" data-action="modal-sub-rm" type="button">✕</button>
  </div>`;
}
function todoModal(id, presetDate) {
  const t = id ? S.todos.find(x => x.id === id) : null;
  const d = t ? t.date : (presetDate || (V.tab === 'calendar' ? V.calSel : V.date));
  const tags = t ? [...(t.tags || [])] : [];
  openModal(`
    <div class="m-title">${t ? '할 일 수정' : '새 할 일'}</div>
    <div class="field"><input class="input" id="td-title" placeholder="무엇을 할까요?" maxlength="100" value="${t ? esc(t.title) : ''}"></div>
    <div class="frow">
      <div class="field"><label>날짜</label><input class="input" type="date" id="td-date" value="${d}"></div>
      <div class="field"><label>시간 (선택)</label><input class="input" type="time" id="td-time" value="${t && t.time ? t.time : ''}"></div>
    </div>
    <div class="field"><label>우선순위</label>
      <div class="seg" id="td-pri">${PRI.map((p, i) =>
        `<button type="button" class="${(t ? t.priority : 1) === i ? 'on' : ''}" data-pri="${i}">${p}</button>`).join('')}</div>
    </div>
    <div class="field"><label>서브태스크 체크리스트</label>
      <div class="sub-edit" id="td-subs">${(t && t.subtasks ? t.subtasks : []).map(subLineHTML).join('')}</div>
      <button class="add-line" data-action="modal-sub-add" type="button">＋ 단계 추가</button>
    </div>
    <div class="field"><label>태그</label>
      <div class="tags-box" id="td-tags"><input id="td-tag-in" placeholder="입력 후 Enter"></div>
      <div class="tag-sugs" id="td-sugs"></div>
    </div>
    <div class="field"><label>목표 연결 (선택)</label>
      <select class="input" id="td-goal">
        <option value="">연결 안 함</option>
        ${S.goals.filter(g => !g.done).map(g =>
          `<option value="${g.id}" ${t && t.goalId === g.id ? 'selected' : ''}>[${TYPE_NAME[g.type]}] ${esc(g.title)}</option>`).join('')}
      </select>
    </div>
    <div class="field"><label>메모</label><textarea class="input" id="td-memo" maxlength="500" placeholder="메모 (선택)">${t ? esc(t.memo || '') : ''}</textarea></div>
    <div class="m-actions">
      ${t ? `<button class="btn btn-danger" id="td-del">삭제</button>` : ''}
      <button class="btn" data-action="close-modal">취소</button>
      <button class="btn btn-primary" id="td-save">저장</button>
    </div>
  `);
  // 우선순위 세그먼트
  let pri = t ? t.priority : 1;
  $('#td-pri').addEventListener('click', e => {
    const b = e.target.closest('[data-pri]'); if (!b) return;
    pri = +b.dataset.pri;
    $$('#td-pri button').forEach(x => x.classList.toggle('on', x === b));
  });
  // 태그 입력
  const tagBox = $('#td-tags'), tagIn = $('#td-tag-in');
  const renderTags = () => {
    tagBox.querySelectorAll('.chip').forEach(c => c.remove());
    tags.slice().reverse().forEach(tg => {
      const c = document.createElement('span');
      c.className = 'chip accent';
      c.innerHTML = `# ${esc(tg)} <button type="button">✕</button>`;
      c.querySelector('button').onclick = () => { tags.splice(tags.indexOf(tg), 1); renderTags(); };
      tagBox.prepend(c);
    });
    const sugs = allTags().filter(x => !tags.includes(x)).slice(0, 6);
    $('#td-sugs').innerHTML = sugs.map(x => `<button type="button" class="chip" data-tag="${esc(x)}"># ${esc(x)}</button>`).join('');
    $$('#td-sugs .chip').forEach(b => b.onclick = () => { tags.push(b.dataset.tag); renderTags(); });
  };
  const addTag = () => {
    const v = tagIn.value.replace(/,/g, '').trim();
    if (v && !tags.includes(v) && tags.length < 6) tags.push(v);
    tagIn.value = ''; renderTags();
  };
  tagIn.addEventListener('keydown', e => {
    if (e.key === 'Enter' || e.key === ',') { e.preventDefault(); addTag(); }
    else if (e.key === 'Backspace' && !tagIn.value && tags.length) { tags.pop(); renderTags(); }
  });
  tagIn.addEventListener('blur', addTag);
  renderTags();
  // 저장/삭제
  $('#td-save').onclick = () => {
    const title = $('#td-title').value.trim();
    if (!title) { toast('제목을 입력해주세요'); $('#td-title').focus(); return; }
    const subs = $$('#td-subs .sub-line').map(l => ({
      id: l.dataset.sid, title: l.querySelector('input').value.trim(), done: l.dataset.done === '1'
    })).filter(x => x.title);
    const data = {
      title,
      date: $('#td-date').value || todayStr(),
      time: $('#td-time').value || null,
      priority: pri, tags: [...tags], subtasks: subs,
      goalId: $('#td-goal').value || null,
      memo: $('#td-memo').value.trim()
    };
    if (t) Object.assign(t, data);
    else S.todos.push({ id: uid(), done: false, doneAt: null, createdAt: new Date().toISOString(), ...data });
    save(); closeModal(); render();
    toast(t ? '수정했어요' : '할 일을 추가했어요 ✅');
  };
  if (t) $('#td-del').onclick = async () => {
    if (await confirmDlg('할 일 삭제', `'${t.title}'을(를) 삭제할까요?`, { danger: true, ok: '삭제' })) {
      S.todos = S.todos.filter(x => x.id !== t.id);
      save(); render(); toast('삭제했어요');
    }
  };
  if (!t) setTimeout(() => $('#td-title').focus(), 250);
}
function todoMenu(id) {
  const t = S.todos.find(x => x.id === id); if (!t) return;
  const today = todayStr();
  openModal(`
    <div class="m-title" style="margin-bottom:8px">${esc(t.title.length > 22 ? t.title.slice(0, 22) + '…' : t.title)}</div>

      <button class="btn" data-action="menu-tomorrow" data-id="${id}">⏭️ 내일로 미루기</button>

function routineModal(id) {
  const r = id ? S.routines.find(x => x.id === id) : null;
  const days = r ? [...r.days] : [0, 1, 2, 3, 4, 5, 6];
  openModal(`
    <div class="m-title">${r ? '루틴 수정' : '새 루틴'}</div>
    <div class="field"><input class="input" id="rt-title" placeholder="예: 아침 스트레칭, 영어 단어 20개" maxlength="60" value="${r ? esc(r.title) : ''}"></div>
    <div class="field"><label>반복 요일</label>
      <div class="day-picks" id="rt-days">${KD.map((k, i) =>
        `<button type="button" class="day-pick ${days.includes(i) ? 'on' : ''}" data-day="${i}">${k}</button>`).join('')}</div>
      <div style="display:flex;gap:6px;margin-top:8px">
        <button type="button" class="chip" id="rt-all">매일</button>
        <button type="button" class="chip" id="rt-weekday">평일만</button>
        <button type="button" class="chip" id="rt-weekend">주말만</button>
      </div>
    </div>
    <div class="frow">
      <div class="field"><label>시간 (선택)</label><input class="input" type="time" id="rt-time" value="${r && r.time ? r.time : ''}"></div>
      <div class="field"><label>시작일</label><input class="input" type="date" id="rt-start" value="${r ? (r.startDate || todayStr()) : todayStr()}"></div>
    </div>
    ${r ? `<div class="field"><label>보관</label>
      <button class="btn btn-block ${r.archived ? 'btn-primary' : 'btn-ghost'}" id="rt-arch">${r.archived ? '📦 보관됨 — 눌러서 다시 사용' : '📦 보관하기 (기록은 유지, 목록에서 숨김)'}</button></div>` : ''}
    <div class="m-actions">
      ${r ? `<button class="btn btn-danger" id="rt-del">삭제</button>` : ''}
      <button class="btn" data-action="close-modal">취소</button>
      <button class="btn btn-primary" id="rt-save">저장</button>
    </div>
  `);
  const dayBox = $('#rt-days');
  const setDays = arr => { days.length = 0; days.push(...arr); $$('#rt-days .day-pick').forEach((b, i) => b.classList.toggle('on', days.includes(i))); };
  dayBox.addEventListener('click', e => {
    const b = e.target.closest('[data-day]'); if (!b) return;
    const i = +b.dataset.day;
    days.includes(i) ? days.splice(days.indexOf(i), 1) : days.push(i);
    b.classList.toggle('on');
  });
  $('#rt-all').onclick = () => setDays([0, 1, 2, 3, 4, 5, 6]);
  $('#rt-weekday').onclick = () => setDays([1, 2, 3, 4, 5]);
  $('#rt-weekend').onclick = () => setDays([0, 6]);
  let archived = r ? !!r.archived : false;
  if (r) $('#rt-arch').onclick = function () {
    archived = !archived;
    this.className = `btn btn-block ${archived ? 'btn-primary' : 'btn-ghost'}`;
    this.textContent = archived ? '📦 보관됨 — 눌러서 다시 사용' : '📦 보관하기 (기록은 유지, 목록에서 숨김)';
  };
  $('#rt-save').onclick = () => {
    const title = $('#rt-title').value.trim();
    if (!title) { toast('루틴 이름을 입력해주세요'); return; }
    if (!days.length) { toast('요일을 하나 이상 선택해주세요'); return; }
    const data = { title, days: [...days].sort(), time: $('#rt-time').value || null, startDate: $('#rt-start').value || todayStr(), archived };
    if (r) Object.assign(r, data);
    else S.routines.push({ id: uid(), createdAt: new Date().toISOString(), ...data });
    save(); closeModal(); render();
    toast(r ? '루틴을 수정했어요' : '루틴을 만들었어요 🔁');
  };
  if (r) $('#rt-del').onclick = async () => {
    if (await confirmDlg('루틴 삭제', `'${r.title}' 루틴과 모든 체크 기록을 삭제할까요?\n보관하면 기록은 남길 수 있어요.`, { danger: true, ok: '삭제' })) {
      S.routines = S.routines.filter(x => x.id !== r.id);
      for (const d in S.routineLog) {
        S.routineLog[d] = S.routineLog[d].filter(x => x !== r.id);
        if (!S.routineLog[d].length) delete S.routineLog[d];
      }
      save(); closeModal(); render(); toast('루틴을 삭제했어요');
    }
  };
  if (!r) setTimeout(() => $('#rt-title').focus(), 250);
}

/* ============================================================
   모달: 기록(트래커)
   ============================================================ */
function trackerLogModal(id, d) {
  const tk = trackerById(id); if (!tk) return;
  if (d > todayStr()) { toast('미래 날짜는 기록할 수 없어요'); return; }
  const cur = trackerVal(tk.id, d);
  const isNum = tk.type === 'number';
  const recent = trackerEntries(tk, addDays(d, -90), d).slice(-7).reverse();
  openModal(`
    <div class="m-title">${esc(tk.emoji || '📊')} ${esc(tk.name)} <span class="chip">${fmtKoShort(d)} ${KD[dow(d)]}</span></div>
    ${isNum ? `
      <div class="field"><label>값${tk.unit ? ` (${esc(tk.unit)})` : ''}</label>
        <input class="input" type="number" step="any" inputmode="decimal" id="tk-in" placeholder="예: 72.5" value="${cur !== undefined ? fmtNum(cur) : ''}">
        ${tk.target != null ? `<div style="font-size:.78rem;color:var(--sub);margin-top:6px">🎯 목표 ${fmtNum(tk.target)}${tk.unit ? ' ' + esc(tk.unit) : ''}</div>` : ''}
      </div>` : `
      <div class="field"><label>기록 내용</label>
        <textarea class="input" id="tk-in" rows="4" maxlength="500" placeholder="예: 어린왕자 40쪽까지 / 하체 운동 50분 / 아침 샐러드, 점심 김치찌개">${cur !== undefined ? esc(String(cur)) : ''}</textarea>
      </div>`}
    ${recent.length ? `<div class="field"><label>최근 기록</label>
      <div>${recent.map(e => `
        <div style="display:flex;justify-content:space-between;gap:12px;padding:7px 4px;border-bottom:1px solid var(--line);font-size:.85rem">
          <span style="color:var(--sub);flex:none">${fmtKoShort(e.d)}</span>
          <span style="text-align:right;word-break:break-word;color:var(--text)">${esc(isNum ? fmtNum(e.v) + (tk.unit ? ' ' + tk.unit : '') : String(e.v).replace(/\n/g, ' ').slice(0, 42))}</span>
        </div>`).join('')}</div></div>` : ''}
    <div class="m-actions">
      ${cur !== undefined ? `<button class="btn btn-danger" id="tk-del">지우기</button>` : ''}
      ${isNum ? `<button class="btn" id="tk-plus">＋ 더하기</button>` : ''}
      <button class="btn btn-primary" id="tk-save" style="flex:1">저장</button>
    </div>
    ${isNum ? `<div style="font-size:.72rem;color:var(--faint);margin-top:9px;text-align:center">＋ 더하기 = 오늘 값에 누적 (칼로리·물 등) · 저장 = 입력값 그대로 기록</div>` : ''}
  `);
  const input = $('#tk-in');
  $('#tk-save').onclick = () => {
    let v = input.value;
    if (isNum) {
      v = parseFloat(v);
      if (isNaN(v)) { toast('숫자를 입력해주세요'); input.focus(); return; }
      v = Math.round(v * 100) / 100;
    } else {
      v = v.trim();
      if (!v) { toast('내용을 입력해주세요'); input.focus(); return; }
    }
    setTrackerVal(tk.id, d, v);
    save(); closeModal(); render(); toast('기록했어요 📊');
  };
  if (isNum) $('#tk-plus').onclick = () => {
    const add = parseFloat(input.value);
    if (isNaN(add)) { toast('더할 숫자를 입력해주세요'); input.focus(); return; }
    const base = typeof cur === 'number' ? cur : 0;
    const v = Math.round((base + add) * 100) / 100;
    setTrackerVal(tk.id, d, v);
    save(); closeModal(); render();
    toast(`＋${fmtNum(add)} → 오늘 ${fmtNum(v)}${tk.unit ? ' ' + tk.unit : ''}`);
  };
  if (cur !== undefined) $('#tk-del').onclick = () => {
    setTrackerVal(tk.id, d, null);
    save(); closeModal(); render(); toast('기록을 지웠어요');
  };
  if (cur === undefined) setTimeout(() => input.focus(), 250);
}

const EMOJI_PRESETS = ['⚖️', '📖', '🔥', '🏃', '💧', '😴', '💰', '🧘', '📵', '🎸'];
function trackerModal(id) {
  const tk = id ? trackerById(id) : null;

        <div class="field"><label>목표값 (선택)</label><input class="input" type="number" step="any" inputmode="decimal" id="tr-target" value="${tk && tk.target != null ? tk.target : ''}"></div>

      <select class="input" id="tr-goal">

        ${S.goals.filter(g => !g.done).map(g => `<option value="${g.id}" ${tk && tk.goalId === g.id ? 'selected' : ''}>[${TYPE_NAME[g.type]}] ${esc(g.title)}</option>`).join('')}
      </select></div>
    ${tk ? `<div class="field"><button class="btn btn-block ${tk.archived ? 'btn-primary' : 'btn-ghost'}" id="tr-arch">${tk.archived ? '📦 보관됨 — 눌러서 다시 사용' : '📦 보관하기 (기록은 유지, 목록에서 숨김)'}</button></div>` : ''}
    <div class="m-actions">
      ${tk ? `<button class="btn btn-danger" id="tr-del">삭제</button>` : ''}
      <button class="btn" data-action="close-modal">취소</button>
      <button class="btn btn-primary" id="tr-save">저장</button>
    </div>
  `);
  $$('.emj').forEach(b => b.onclick = () => { $('#tr-emoji').value = b.dataset.e; });
  let type = tk ? tk.type : 'number';
  $('#tr-type').addEventListener('click', e => {
    const b = e.target.closest('[data-t]'); if (!b) return;
    type = b.dataset.t;
    $$('#tr-type button').forEach(x => x.classList.toggle('on', x === b));
    $('#tr-numfields').style.display = type === 'number' ? '' : 'none';
  });
  let archived = tk ? !!tk.archived : false;
  if (tk) $('#tr-arch').onclick = function () {
    archived = !archived;
    this.className = `btn btn-block ${archived ? 'btn-primary' : 'btn-ghost'}`;
    this.textContent = archived ? '📦 보관됨 — 눌러서 다시 사용' : '📦 보관하기 (기록은 유지, 목록에서 숨김)';
  };

    const tval = $('#tr-target').value;

      name, emoji: $('#tr-emoji').value.trim() || '📊', type,
      unit: type === 'number' ? $('#tr-unit').value.trim() : '',

      goalId: $('#tr-goal').value || null, archived
    };

    else S.trackers.push({ id: uid(), createdAt: new Date().toISOString(), ...data });

    toast(tk ? '수정했어요' : '기록 항목을 만들었어요 📊');

        delete S.trackerLog[d][tk.id];
        if (!Object.keys(S.trackerLog[d]).length) delete S.trackerLog[d];
      }
      save(); closeModal(); render(); toast('삭제했어요');
    }
  };
  if (!tk) setTimeout(() => $('#tr-name').focus(), 250);

/* ============================================================
   모달: 목표
   ============================================================ */
function goalModal(id, opts) {
  const g = id ? S.goals.find(x => x.id === id) : null;
  const type = g ? g.type : V.goalType;
  const key = g ? g.period : V.goalKey[V.goalType];
  const year = +key.slice(0, 4);
  const years = [year - 1, year, year + 1, year + 2].filter((v, i, a) => a.indexOf(v) === i);
  const curY = +yearKeyOf(todayStr());
  if (!years.includes(curY)) years.push(curY);
  years.sort();

  const pickerHTML = (tp, k) => {
    const y = +k.slice(0, 4);
    let sub = '';
    if (tp === 'month') sub = `<select class="input" id="gl-sub">${Array.from({ length: 12 }, (_, i) =>
      `<option value="${i + 1}" ${+k.slice(5, 7) === i + 1 ? 'selected' : ''}>${i + 1}월</option>`).join('')}</select>`;
    if (tp === 'quarter') sub = `<select class="input" id="gl-sub">${[1, 2, 3, 4].map(q =>
      `<option value="${q}" ${+k.slice(6) === q ? 'selected' : ''}>${q}분기</option>`).join('')}</select>`;
    return `<div class="frow"><div class="field" style="margin:0"><select class="input" id="gl-year">${years.map(yy =>
      `<option value="${yy}" ${yy === y ? 'selected' : ''}>${yy}년</option>`).join('')}</select></div>
      ${sub ? `<div class="field" style="margin:0">${sub}</div>` : ''}</div>`;
  };
  openModal(`
    <div class="m-title">${g ? '목표 수정' : '새 목표'}</div>
    <div class="field"><input class="input" id="gl-title" placeholder="예: 책 12권 읽기, 5kg 감량" maxlength="60" value="${g ? esc(g.title) : ''}"></div>
    <div class="field"><label>기간 단위</label>
      <div class="seg" id="gl-type">${['month', 'quarter', 'year'].map(tp =>
        `<button type="button" class="${type === tp ? 'on' : ''}" data-type="${tp}">${TYPE_NAME[tp]}</button>`).join('')}</div>
    </div>
    <div class="field"><label>기간</label><div id="gl-picker">${pickerHTML(type, key)}</div></div>
    <div class="field"><label>진행률 계산 방식</label>
      <div class="seg" id="gl-mode">
        <button type="button" data-mode="metric">📏 측정값</button>
        <button type="button" data-mode="milestone">📍 마일스톤</button>
        <button type="button" data-mode="manual">🎚️ 직접</button>
      </div>
    </div>
    <div class="pmode" id="pm-metric">
      <div class="preset-chips" style="justify-content:flex-start;margin:0 0 13px">
        ${GOAL_METRIC_PRESETS.map(p => `<button type="button" class="chip" data-mpreset="${p.k}">${p.label}</button>`).join('')}
      </div>
      <div class="field"><label>측정 방향</label>
        <div class="seg" id="gl-dir">
          <button type="button" data-dir="down">줄이기 ↓ (체중 등)</button>
          <button type="button" data-dir="up">늘리기 ↑ (독서·운동 등)</button>
        </div>
      </div>
      <div class="frow">
        <div class="field" id="gl-start-field"><label>시작값</label>
          <input class="input" type="number" step="any" inputmode="decimal" id="gl-mstart" placeholder="예: 80"></div>
        <div class="field"><label>현재값</label>
          <input class="input" type="number" step="any" inputmode="decimal" id="gl-mcur" placeholder="예: 75"></div>
        <div class="field"><label>목표값</label>
          <input class="input" type="number" step="any" inputmode="decimal" id="gl-mtarget" placeholder="예: 70"></div>
      </div>
      <div id="gl-link-note" class="pf-note" style="display:none;text-align:left;margin:0 0 12px;color:var(--accent-dark);font-weight:600"></div>
      <div class="field"><label>단위</label>
        <input class="input" id="gl-munit" maxlength="8" placeholder="kg · 권 · km · 시간 · 회…"></div>
      <div class="field" style="margin-bottom:6px"><div id="gl-metric-preview" class="metric-preview"></div></div>
    </div>
    <div class="pmode" id="pm-milestone">
      <div class="field" style="margin-bottom:6px"><label>마일스톤 (단계별 체크 → 진행률 자동 계산)</label>
        <div class="ms-edit" id="gl-ms">${(g && g.milestones ? g.milestones : []).map(subLineHTML).join('')}</div>
        <button class="add-line" data-action="modal-ms-add" type="button">＋ 마일스톤 추가</button>
      </div>
    </div>
    <div class="pmode" id="pm-manual">
      <div class="field"><label>진행률 직접 조절</label>
        <div class="slider-row"><input type="range" id="gl-prog" min="0" max="100" step="5" value="${g ? (g.progress || 0) : 0}"><b id="gl-prog-v">${g ? (g.progress || 0) : 0}%</b></div>
      </div>
    </div>
    <div class="field"><label>메모</label><textarea class="input" id="gl-memo" maxlength="300" placeholder="목표에 대한 다짐, 측정 방법 등">${g ? esc(g.memo || '') : ''}</textarea></div>
    ${g ? `<div class="field"><button class="btn btn-block ${g.done ? 'btn-primary' : 'btn-ghost'}" id="gl-done">${g.done ? '🏆 달성 완료! — 눌러서 되돌리기' : '🏆 목표 달성으로 표시'}</button></div>` : ''}
    <div class="m-actions">
      ${g ? `<button class="btn btn-danger" id="gl-del">삭제</button>` : ''}
      <button class="btn" data-action="close-modal">취소</button>
      <button class="btn btn-primary" id="gl-save">저장</button>
    </div>
  `);
  let curType = type;
  $('#gl-type').addEventListener('click', e => {
    const b = e.target.closest('[data-type]'); if (!b) return;
    curType = b.dataset.type;
    $$('#gl-type button').forEach(x => x.classList.toggle('on', x === b));
    const y = $('#gl-year') ? $('#gl-year').value : year;
    const defK = curType === 'month' ? `${y}-${pad(new Date().getMonth() + 1)}` : curType === 'quarter' ? `${y}-Q${Math.floor(new Date().getMonth() / 3) + 1}` : String(y);
    $('#gl-picker').innerHTML = pickerHTML(curType, defK);
  });
  // 진행률 방식(측정/마일스톤/직접) + 측정 방향
  const m0 = g && hasMetric(g) ? g.metric : null;
  let curDir = m0 ? m0.dir : 'down';
  let curLink = m0 ? (m0.link || null) : null;   // 포트폴리오 자동 연동 지표
  let curMode = m0 ? 'metric' : (g && g.milestones && g.milestones.length ? 'milestone' : (g ? 'manual' : 'metric'));
  if (m0) {
    $('#gl-mstart').value = m0.start != null ? m0.start : '';
    $('#gl-mcur').value = m0.current != null ? m0.current : '';
    $('#gl-mtarget').value = m0.target != null ? m0.target : '';
    $('#gl-munit').value = m0.unit || '';
  }
  const applyMode = () => {
    $$('#gl-mode button').forEach(b => b.classList.toggle('on', b.dataset.mode === curMode));
    $('#pm-metric').style.display = curMode === 'metric' ? '' : 'none';
    $('#pm-milestone').style.display = curMode === 'milestone' ? '' : 'none';
    $('#pm-manual').style.display = curMode === 'manual' ? '' : 'none';
  };
  const applyDir = () => {
    $$('#gl-dir button').forEach(b => b.classList.toggle('on', b.dataset.dir === curDir));
    $('#gl-start-field').style.display = curDir === 'down' && !curLink ? '' : 'none';   // 늘리기·연동은 시작값 0으로 간주
  };
  // 포트폴리오 연동이면 현재값을 실시간 값으로 고정하고 안내 표시
  const applyLink = () => {
    const note = $('#gl-link-note'), curField = $('#gl-mcur');
    $('#gl-dir').closest('.field').style.display = curLink ? 'none' : '';
    if (curLink) {
      const unit = $('#gl-munit').value.trim() || '만원';
      const usd = pfLinkUSD(curLink);
      const v = usd != null ? Math.round(pfToUnit(usd, unit) * 100) / 100 : '';
      curField.value = v; curField.readOnly = true; curField.style.opacity = '.55';
      note.style.display = '';
      note.innerHTML = `🔄 현재값은 <b>내 포트폴리오 · ${PF_LINK_LABEL[curLink] || ''}</b>과(와) 자동 연동돼요 — 지금 <b>${fmtNum(v)} ${esc(unit)}</b>`;
    } else {
      curField.readOnly = false; curField.style.opacity = '';
      note.style.display = 'none';
    }
  };
  const readMetric = () => ({
    dir: curDir,
    unit: $('#gl-munit').value.trim(),
    start: curDir === 'down' && !curLink ? parseNum($('#gl-mstart').value) : null,
    target: parseNum($('#gl-mtarget').value),
    current: curLink ? null : parseNum($('#gl-mcur').value),
    link: curLink || null
  });
  const updatePreview = () => {
    if (curLink) applyLink();   // 단위가 바뀌면 연동 현재값도 갱신
    const m = readMetric();
    const box = $('#gl-metric-preview');
    if (m.target == null) { box.innerHTML = '<span style="color:var(--faint)">목표값을 입력하면 진행률이 자동으로 계산돼요</span>'; return; }
    const sm = metricSummary(m);
    box.innerHTML = `<div class="mp-bar"><div class="progress" style="flex:1"><div style="width:${sm.p}%"></div></div><b>${sm.p}%</b></div>
      <div class="mp-txt">${sm.line}</div>`;
  };
  const applyPreset = p => {
    curDir = p.dir; curLink = p.link || null;
    $('#gl-munit').value = p.unit;
    applyDir(); applyLink(); updatePreview();
  };
  applyMode(); applyDir(); applyLink(); updatePreview();
  $('#gl-mode').addEventListener('click', e => { const b = e.target.closest('[data-mode]'); if (!b) return; curMode = b.dataset.mode; applyMode(); });
  $('#gl-dir').addEventListener('click', e => { const b = e.target.closest('[data-dir]'); if (!b) return; curDir = b.dataset.dir; applyDir(); updatePreview(); });
  $$('#pm-metric [data-mpreset]').forEach(b => b.onclick = () => {
    const p = GOAL_METRIC_PRESETS.find(x => x.k === b.dataset.mpreset); if (!p) return;
    applyPreset(p);
    $('#gl-mtarget').focus();
  });
  // 자산 탭 등에서 프리셋을 지정해 연 경우 자동 적용
  if (!g && opts && opts.mpreset) {
    const p = GOAL_METRIC_PRESETS.find(x => x.k === opts.mpreset);
    if (p) { curMode = 'metric'; applyMode(); applyPreset(p); }
  }
  ['gl-mstart', 'gl-mcur', 'gl-mtarget', 'gl-munit'].forEach(idn => $('#' + idn).addEventListener('input', updatePreview));
  const slider = $('#gl-prog');
  slider.addEventListener('input', () => $('#gl-prog-v').textContent = slider.value + '%');
  let gdone = g ? !!g.done : false;
  if (g) $('#gl-done').onclick = function () {
    gdone = !gdone;
    this.className = `btn btn-block ${gdone ? 'btn-primary' : 'btn-ghost'}`;
    this.textContent = gdone ? '🏆 달성 완료! — 눌러서 되돌리기' : '🏆 목표 달성으로 표시';
  };
  $('#gl-save').onclick = () => {
    const title = $('#gl-title').value.trim();
    if (!title) { toast('목표를 입력해주세요'); return; }
    const y = $('#gl-year').value;
    const sub = $('#gl-sub') ? $('#gl-sub').value : null;
    const period = curType === 'month' ? `${y}-${pad(+sub)}` : curType === 'quarter' ? `${y}-Q${sub}` : String(y);

    let metric = null, ms = [], progress = 0;
    if (curMode === 'metric') {
      const m = readMetric();
      const anyFilled = m.target != null || m.current != null || m.start != null || m.unit;
      if (anyFilled && m.target == null) { toast('목표값을 입력해주세요'); $('#gl-mtarget').focus(); return; }
      if (m.target != null) metric = m;
    } else if (curMode === 'milestone') {
      ms = $$('#gl-ms .sub-line').map(l => ({
        id: l.dataset.sid, title: l.querySelector('input').value.trim(), done: l.dataset.done === '1'
      })).filter(x => x.title);
    } else {
      progress = +slider.value;
    }

    const data = { title, type: curType, period, metric, milestones: ms, progress, memo: $('#gl-memo').value.trim(), done: gdone };
    if (g) Object.assign(g, data);
    else S.goals.push({ id: uid(), createdAt: new Date().toISOString(), ...data });
    V.goalType = curType; V.goalKey[curType] = period;
    save(); closeModal(); render();
    toast(g ? '목표를 수정했어요' : '목표를 세웠어요 🎯');
  };
  if (g) $('#gl-del').onclick = async () => {
    if (await confirmDlg('목표 삭제', `'${g.title}' 목표를 삭제할까요?`, { danger: true, ok: '삭제' })) {
      S.goals = S.goals.filter(x => x.id !== g.id);
      S.todos.forEach(t => { if (t.goalId === g.id) t.goalId = null; });
      save(); closeModal(); render(); toast('목표를 삭제했어요');
    }
  };
  if (!g) setTimeout(() => $('#gl-title').focus(), 250);
}

/* 측정형 목표 — 현재값 빠른 업데이트 */
function goalMetricModal(id) {
  const g = goalById(id); if (!g || !hasMetric(g)) return;
  if (g.metric.link) { toast('이 목표는 내 포트폴리오와 자동으로 연동돼요 🔄'); return; }
  const m = g.metric, up = m.dir === 'up';
  const u = m.unit ? ' ' + esc(m.unit) : '';
  openModal(`
    <div class="m-title">${esc(g.title)} <span class="chip violet">${up ? '누적 기록' : '현재값'}</span></div>
    <div class="field"><label>현재값${m.unit ? ` (${esc(m.unit)})` : ''}</label>
      <input class="input" type="number" step="any" inputmode="decimal" id="gm-in" placeholder="예: ${fmtNum(m.target)}" value="${m.current != null ? fmtNum(m.current) : ''}">
      <div style="font-size:.78rem;color:var(--sub);margin-top:7px">
        🎯 목표 <b>${fmtNum(m.target)}</b>${u}${!up && m.start != null ? ` · 시작 ${fmtNum(m.start)}${u}` : ''}
      </div>
    </div>
    <div class="m-actions">
      ${m.current != null ? `<button class="btn btn-danger" id="gm-clear">지우기</button>` : ''}
      ${up ? `<button class="btn" id="gm-plus">＋ 더하기</button>` : ''}
      <button class="btn btn-primary" id="gm-save" style="flex:1">저장</button>
    </div>
    ${up ? `<div style="font-size:.72rem;color:var(--faint);margin-top:9px;text-align:center">＋ 더하기 = 지금까지 값에 누적 · 저장 = 입력값 그대로</div>` : ''}
  `);
  const input = $('#gm-in');
  const commit = val => {
    g.metric.current = val;
    const p = metricProg(g.metric);
    save(); closeModal(); render();
    if (p >= 100 && !g.done) toast('목표값 달성! 🏆 완료로 표시해보세요');
    else toast('기록했어요 📊');
  };
  $('#gm-save').onclick = () => {
    const v = parseNum(input.value);
    if (v == null) { toast('숫자를 입력해주세요'); input.focus(); return; }
    commit(Math.round(v * 100) / 100);
  };
  if (up) $('#gm-plus').onclick = () => {
    const add = parseNum(input.value);
    if (add == null) { toast('더할 숫자를 입력해주세요'); input.focus(); return; }
    const base = m.current != null ? +m.current : 0;
    commit(Math.round((base + add) * 100) / 100);
  };

  setTimeout(() => input.focus(), 250);
}

    const hits = S.todos.filter(t =>
      t.title.toLowerCase().includes(q) ||
      (t.memo || '').toLowerCase().includes(q) ||
      (t.tags || []).some(tag => tag.toLowerCase().includes(q))
    ).sort((a, b) => b.date.localeCompare(a.date)).slice(0, 40);

      html += todoHTML(t);
    }

function shareStats(rangeKey) {
  const r = statsRangeOf(rangeKey);
  const st = rangeStats(r.start, r.end);
  // 기간 내 기분 최빈값
  const moods = [];
  for (const d of dateRange(r.start, r.end > todayStr() ? todayStr() : r.end)) {
    const ref = S.reflections[d];
    if (ref && ref.mood != null) moods.push(ref.mood);
  }
  const moodTop = moods.length ? MOODS[moods.sort((a, b) =>
    moods.filter(x => x === a).length - moods.filter(x => x === b).length).pop()] : null;
  // 이 기간과 겹치는 목표
  const goals = S.goals.filter(g => {
    const pr = periodRange(g.type, g.period);
    return pr.start <= r.end && pr.end >= r.start;
  }).sort((a, b) => goalProg(b) - goalProg(a)).slice(0, 4);
  return { ...r, ...st, bestStreak: maxBestStreak(), curStreak: maxCurStreak(), moodTop, goals, rangeKey };
}
function roundRectPath(ctx, x, y, w, h, r) {
  ctx.beginPath();
  ctx.moveTo(x + r, y);
  ctx.arcTo(x + w, y, x + w, y + h, r);
  ctx.arcTo(x + w, y + h, x, y + h, r);
  ctx.arcTo(x, y + h, x, y, r);
  ctx.arcTo(x, y, x + w, y, r);
  ctx.closePath();
}
function drawShareCard(data, includeGoals) {
  const cv = $('#share-canvas');
  const showGoals = includeGoals && data.goals.length;
  cv.height = showGoals ? 1350 : 1130;
  const ctx = cv.getContext('2d');
  const W = 1080, H = cv.height;
  const F = w => `${w} "Segoe UI", "Malgun Gothic", "Apple SD Gothic Neo", sans-serif`;

  // 배경
  const bg = ctx.createLinearGradient(0, 0, 0, H);
  bg.addColorStop(0, '#f2fbf7'); bg.addColorStop(.5, '#f7f9fa'); bg.addColorStop(1, '#eef8f3');
  ctx.fillStyle = bg; ctx.fillRect(0, 0, W, H);
  // 헤더
  ctx.fillStyle = '#059669'; ctx.font = F('800 44px'); ctx.textAlign = 'left';
  ctx.fillText('🌱 동건루틴', 72, 108);
  ctx.fillStyle = '#9ca3af'; ctx.font = F('600 28px'); ctx.textAlign = 'right';
  ctx.fillText(todayStr().replace(/-/g, '.'), W - 72, 106);
  ctx.textAlign = 'left';
  ctx.fillStyle = '#6b7280'; ctx.font = F('600 32px');
  ctx.fillText(`${S.settings.name}님의 기록`, 72, 178);
  ctx.fillStyle = '#111827'; ctx.font = F('800 62px');
  ctx.fillText(data.label, 72, 248);

  // 완료율 링
  const cx = 300, cy = 430, R = 118;
  ctx.lineWidth = 30; ctx.lineCap = 'round';
  ctx.strokeStyle = '#e5e7eb';
  ctx.beginPath(); ctx.arc(cx, cy, R, 0, Math.PI * 2); ctx.stroke();
  if (data.rate > 0) {
    ctx.strokeStyle = '#10b981';
    ctx.beginPath(); ctx.arc(cx, cy, R, -Math.PI / 2, -Math.PI / 2 + Math.PI * 2 * data.rate / 100); ctx.stroke();
  }
  ctx.fillStyle = '#111827'; ctx.font = F('800 72px'); ctx.textAlign = 'center';
  ctx.fillText(`${data.rate}%`, cx, cy + 12);
  ctx.fillStyle = '#6b7280'; ctx.font = F('600 28px');
  ctx.fillText('완료율', cx, cy + 58);

  // 숫자 스탯
  const stats = [
    [`${data.done}/${data.total}`, '완료한 일'],
    [`${data.activeDays}일`, '활동한 날'],
    [`🔥 ${data.bestStreak}일`, '최고 스트릭'],
    [data.moodTop ? `${data.moodTop} ${data.reflDays}일` : `✍️ ${data.reflDays}일`, '회고 기록']
  ];
  stats.forEach(([v, l], i) => {
    const x = 520, y = 320 + i * 82;
    ctx.textAlign = 'left';
    roundRectPath(ctx, x, y - 44, 488, 66, 18);
    ctx.fillStyle = 'rgba(255,255,255,.85)'; ctx.fill();
    ctx.fillStyle = '#111827'; ctx.font = F('800 34px');
    ctx.fillText(v, x + 28, y + 2);
    ctx.fillStyle = '#9ca3af'; ctx.font = F('600 25px'); ctx.textAlign = 'right';
    ctx.fillText(l, x + 460, y + 1);
    ctx.textAlign = 'left';
  });

  // 활동 히트맵 (최근 12주)
  ctx.fillStyle = '#374151'; ctx.font = F('700 30px');
  ctx.fillText('활동 기록', 72, 660);
  ctx.fillStyle = '#9ca3af'; ctx.font = F('500 23px'); ctx.textAlign = 'right';
  ctx.fillText('최근 12주', W - 72, 660);
  ctx.textAlign = 'left';
  const heatColors = ['#e8ecef', '#c7ecdb', '#8edcba', '#3fc492', '#0ea472'];
  const cell = 64, gap = 12, hx0 = 72, hy0 = 690;
  const wkStart = weekDates(todayStr())[0];
  for (let c = 0; c < 12; c++) {
    const colStart = addDays(wkStart, -7 * (11 - c));
    for (let rr = 0; rr < 7; rr++) {
      const d = addDays(colStart, rr);
      const x = hx0 + c * (cell + gap), yy = hy0 + rr * ((cell - 26) + 8);
      let fill = heatColors[0];
      if (d <= todayStr()) fill = heatColors[heatLevel(dayStats(d).done)];
      else fill = '#f3f4f6';
      roundRectPath(ctx, x, yy, cell, cell - 26, 10);
      ctx.fillStyle = fill; ctx.fill();
    }
  }

  // 목표
  if (showGoals) {
    ctx.fillStyle = '#374151'; ctx.font = F('700 30px');
    ctx.fillText('🎯 목표 진행', 72, 1075);
    data.goals.forEach((g, i) => {
      const y = 1105 + i * 52;
      const p = goalProg(g);
      let title = g.title.length > 15 ? g.title.slice(0, 15) + '…' : g.title;
      ctx.fillStyle = '#111827'; ctx.font = F('600 27px');
      ctx.fillText(title, 72, y + 26);
      // bar
      roundRectPath(ctx, 530, y + 4, 400, 22, 11);
      ctx.fillStyle = '#e5e7eb'; ctx.fill();
      if (p > 0) {
        roundRectPath(ctx, 530, y + 4, Math.max(22, 400 * p / 100), 22, 11);
        ctx.fillStyle = g.done ? '#f59e0b' : '#10b981'; ctx.fill();
      }
      ctx.fillStyle = '#374151'; ctx.font = F('700 26px'); ctx.textAlign = 'right';
      ctx.fillText(`${p}%`, W - 72, y + 26);
      ctx.textAlign = 'left';
    });
  }

  // 푸터
  ctx.fillStyle = '#9ca3af'; ctx.font = F('500 23px'); ctx.textAlign = 'center';
  ctx.fillText('나의 하루가 쌓여 목표가 됩니다 · 동건루틴', W / 2, H - 44);
  ctx.textAlign = 'left';
  return cv;
}
function shareText(data) {
  const lines = [
    `🌱 동건루틴 | ${data.label}`,
    `✅ 완료율 ${data.rate}% (${data.done}/${data.total})`,
    `📅 활동 ${data.activeDays}일 · 🔥 최고 스트릭 ${data.bestStreak}일 · ✍️ 회고 ${data.reflDays}일`
  ];
  if (data.goals.length) lines.push(`🎯 ${data.goals.slice(0, 3).map(g => `${g.title} ${goalProg(g)}%`).join(' | ')}`);

}

/* ============================================================
   클라우드 자동 동기화 (Firebase) — firebase-config.js 설정 시 활성화

let FB = null;                                  // 모듈 스크립트가 주입하는 Firebase API
const cloud = { user: null, lastSync: null, ready: false };
let applyingRemote = false;
let pushTimer = null;
const deviceId = (() => {
  let d = localStorage.getItem('dgr_device');
  if (!d) { d = uid(); localStorage.setItem('dgr_device', d); }
  return d;
})();

function queuePush() {
  if (!FB || !cloud.user || applyingRemote) return;
  clearTimeout(pushTimer);
  pushTimer = setTimeout(pushCloud, 1200);
}
async function pushCloud() {
  clearTimeout(pushTimer); pushTimer = null;
  if (!FB || !cloud.user) return;
  try {
    await FB.saveData(cloud.user.uid, { data: S, device: deviceId, appVersion: APP_VERSION });
    cloud.lastSync = new Date();
    if (V.tab === 'settings') render();
  } catch (e) { console.warn('클라우드 저장 실패(오프라인이면 다시 연결될 때 저장돼요)', e); }
}
function applyRemote(data) {
  applyingRemote = true;
  S = Object.assign(DEFAULT_DATA(), data);
  save(); applyTheme(); render();
  applyingRemote = false;
  cloud.lastSync = new Date();
}
const dataSummary = d => `할 일 ${(d.todos || []).length} · 루틴 ${(d.routines || []).length} · 목표 ${(d.goals || []).length}`;
const isTrivial = d => !(d.todos || []).length && !(d.routines || []).length && !(d.goals || []).length;

function chooseDataDlg(remoteData) {
  return new Promise(res => {
    openModal(`
      <div class="m-title">어느 데이터를 사용할까요?</div>
      <p style="color:var(--sub);font-size:.9rem;margin:-6px 0 12px">이 기기와 클라우드에 서로 다른 데이터가 있어요.<br>선택하지 않은 쪽은 덮어써져요.</p>
      <div class="menu-list">
        <button class="btn" id="ch-cloud" style="display:block;text-align:left">☁️ 클라우드 데이터 사용<br><span style="font-size:.78rem;color:var(--sub);font-weight:500">${dataSummary(remoteData)}</span></button>
        <button class="btn" id="ch-local" style="display:block;text-align:left">📱 이 기기 데이터를 클라우드에 업로드<br><span style="font-size:.78rem;color:var(--sub);font-weight:500">${dataSummary(S)}</span></button>
      </div>`);
    $('#ch-cloud').onclick = () => { closeModal(); res(true); };
    $('#ch-local').onclick = () => { closeModal(); res(false); };
  });
}
async function onCloudLogin(user) {
  cloud.user = user;
  try {
    const remote = await FB.loadData(user.uid);
    if (!remote || !remote.data || isTrivial(remote.data)) {
      await pushCloud();                        // 클라우드가 비어있음 → 내 데이터 업로드
    } else if (isTrivial(S)) {
      applyRemote(remote.data);                 // 이 기기가 비어있음 → 클라우드 사용
      toast('클라우드 데이터를 불러왔어요 ☁️');
    } else if ((remote.data.meta || {}).updatedAt !== S.meta.updatedAt) {
      const useCloud = await chooseDataDlg(remote.data);
      if (useCloud) { applyRemote(remote.data); toast('클라우드 데이터로 맞췄어요 ☁️'); }
      else await pushCloud();
    }
    FB.listen(user.uid, payload => {            // 다른 기기의 변경을 실시간 반영
      if (!payload || !payload.data) return;
      if (payload.device === deviceId) return;
      if ((payload.data.meta || {}).updatedAt === S.meta.updatedAt) return;
      applyRemote(payload.data);
    });
  } catch (e) { console.warn('클라우드 연결 실패', e); }
  if (V.tab === 'settings') render();
}
async function cloudLogin() {
  if (!window.FIREBASE_CONFIG) { toast('클라우드 설정이 아직 완료되지 않았어요'); return; }
  if (!FB) { toast('동기화 모듈을 못 불러왔어요 — 인터넷 연결을 확인해주세요'); return; }
  // 모든 기기에서 팝업 우선 — 리다이렉트는 모바일 브라우저의
  // 서드파티 저장소 차단 정책 때문에 결과가 소실될 수 있음
  try {
    await FB.login();
  } catch (e) {
    const c = (e && e.code) || '';
    if (c === 'auth/popup-blocked' || c === 'auth/operation-not-supported-in-this-environment') {
      try { await FB.loginRedirect(); }
      catch (e2) { toast('로그인 실패: ' + ((e2 && e2.code) || '알 수 없는 오류')); }
    } else if (c === 'auth/popup-closed-by-user' || c === 'auth/cancelled-popup-request') {
      /* 사용자가 창을 닫음 — 조용히 넘어감 */
    } else if (c === 'auth/unauthorized-domain') {
      toast('이 주소가 Firebase 승인 도메인 목록에 없어요');
    } else {
      toast('로그인 실패: ' + (c || '알 수 없는 오류'));
    }
  }
}
async function cloudLogout() {
  if (FB) { try { await FB.logout(); } catch (e) {} }
  cloud.user = null; cloud.lastSync = null;
  render(); toast('로그아웃했어요. 데이터는 이 기기에 그대로 있어요');
}
window.__fbInit = api => {
  FB = api; cloud.ready = true;
  FB.onAuth(user => {
    if (user) onCloudLogin(user);
    else { cloud.user = null; if (V.tab === 'settings') render(); }
  });
};
const flushPush = () => { if (pushTimer) pushCloud(); };
document.addEventListener('visibilitychange', () => { if (document.hidden) flushPush(); });
window.addEventListener('pagehide', flushPush);

function confettiBurst() {
