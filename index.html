  document.body.appendChild(cv);
  const dpr = Math.min(2, window.devicePixelRatio || 1);
  const W = window.innerWidth, H = window.innerHeight;
  cv.width = W * dpr; cv.height = H * dpr;
  const ctx = cv.getContext('2d');
  ctx.scale(dpr, dpr);
  const colors = ['#10b981', '#f59e0b', '#3b82f6', '#ec4899', '#a78bfa', '#f97316', '#facc15'];
  const ps = Array.from({ length: 90 }, () => ({
    x: W * (0.5 + (Math.random() - 0.5) * 0.55),
    y: H * 0.24 + (Math.random() - 0.5) * 30,
    vx: (Math.random() - 0.5) * 6.5,
    vy: -(2.5 + Math.random() * 6.5),
    w: 5 + Math.random() * 5, h: 8 + Math.random() * 6,
    r: Math.random() * Math.PI, vr: (Math.random() - 0.5) * 0.28,
    c: colors[Math.random() * colors.length | 0]
  }));
  const t0 = performance.now();
  const tick = now => {
    const el = (now - t0) / 1000;
    ctx.clearRect(0, 0, W, H);
    for (const p of ps) {
      p.vy += 0.16; p.x += p.vx; p.y += p.vy; p.r += p.vr;
      ctx.save();
      ctx.translate(p.x, p.y); ctx.rotate(p.r);
      ctx.globalAlpha = Math.max(0, Math.min(1, 1.9 - el));
      ctx.fillStyle = p.c;
      ctx.fillRect(-p.w / 2, -p.h / 2, p.w, p.h);
      ctx.restore();
    }
    if (el < 1.9) confettiRAF = requestAnimationFrame(tick);
    else { cv.remove(); confettiRAF = null; }
  };
  confettiRAF = requestAnimationFrame(tick);
}

/* 출석 스트릭 — 앱을 연 연속 일수 */
function trackVisit() {
  const t = todayStr();
  if (S.meta.lastVisit === t) return;
  S.meta.visitStreak = S.meta.lastVisit === addDays(t, -1) ? (S.meta.visitStreak || 0) + 1 : 1;
  S.meta.lastVisit = t;
  if ((S.meta.visitStreak || 0) > (S.meta.bestVisitStreak || 0)) S.meta.bestVisitStreak = S.meta.visitStreak;
  save();
  const n = S.meta.visitStreak;
  if ([7, 14, 30, 50, 100, 200, 365].includes(n)) setTimeout(() => toast(`📅 ${n}일 연속 방문! 꾸준함이 실력이에요 🔥`), 900);
}

/* 주간 리포트 — 매주 첫 방문 시 지난주 요약을 보여줘요 */
function maybeWeeklyReport() {
  const thisStart = weekDates(todayStr())[0];
  if ((S.meta.firstUse || todayStr()) >= thisStart) return;      // 아직 지난주가 없음
  if (S.meta.lastWeeklyReport === thisStart) return;             // 이번 주에 이미 봄
  if ($('#modal-root').classList.contains('open')) return;       // 다른 창이 열려 있으면 다음 기회에
  const start = addDays(thisStart, -7), end = addDays(thisStart, -1);
  const st = rangeStats(start, end);
  S.meta.lastWeeklyReport = thisStart;
  save();
  if (!st.total && !st.reflDays) return;                         // 지난주 기록이 없으면 조용히
  weeklyReportModal();
}
function weeklyReportModal() {
  const thisStart = weekDates(todayStr())[0];
  const start = addDays(thisStart, -7), end = addDays(thisStart, -1);
  const st = rangeStats(start, end);
  const prev = rangeStats(addDays(start, -7), addDays(start, -1));
  const delta = st.rate - prev.rate;
  let best = null;
  for (const d of dateRange(start, end)) {
    const s = dayStats(d);
    if (s.done > 0 && (!best || s.done > best.done)) best = { d, done: s.done };
  }
  const rws = activeRoutines().map(r => {
    let tot = 0, done = 0;
    for (const d of dateRange(start, end)) if (routineOn(r, d)) { tot++; if (isRDone(r.id, d)) done++; }
    return { r, tot, done };
  }).filter(x => x.tot > 0).sort((a, b) => b.done / b.tot - a.done / a.tot);
  const tks = activeTrackers().filter(tk => tk.type === 'number').map(tk => {
    const es = trackerEntries(tk, start, end);
    if (!es.length) return null;
    const dv = Math.round((+es[es.length - 1].v - +es[0].v) * 100) / 100;
    return { tk, dv };
  }).filter(Boolean);
  const hasAny = st.total > 0 || st.reflDays > 0;
  openModal(`
    <div class="m-title">📮 지난주 리포트 <span class="chip">${fmtKoShort(start)} ~ ${fmtKoShort(end)}</span></div>
    ${!hasAny ? `<div class="empty" style="padding:20px 0"><span class="big">🌙</span>지난주에는 기록이 없어요<br>이번 주부터 다시 쌓아볼까요?</div>` : `
    <div class="goal-sum" style="margin-bottom:6px">
      ${ringHTML(st.rate, 74, 8, '.9rem')}
      <div class="gs-txt">완료 <b>${st.done}/${st.total}</b> · 활동 <b>${st.activeDays}일</b> · 회고 <b>${st.reflDays}일</b><br>
        전주 대비 <b style="color:${delta >= 0 ? 'var(--accent-dark)' : 'var(--red)'}">${delta >= 0 ? '▲' : '▼'} ${Math.abs(delta)}%p</b></div>
    </div>
    ${best ? `<div class="wr-line">🏅 최고의 날 — <b>${fmtKo(best.d)}</b> · ${best.done}개 완료</div>` : ''}
    ${rws.length ? `<div class="wr-line">🔁 루틴 — ${rws.slice(0, 2).map(x => `<b>${esc(x.r.title)}</b> ${x.done}/${x.tot}회`).join(' · ')}</div>` : ''}
    ${tks.length ? `<div class="wr-line">📊 기록 변화 — ${tks.slice(0, 3).map(x => `<b>${esc(x.tk.name)}</b> ${x.dv > 0 ? '+' : ''}${fmtNum(x.dv)}${x.tk.unit ? esc(x.tk.unit) : ''}`).join(' · ')}</div>` : ''}
    `}
    <div class="m-actions">
      <button class="btn" data-action="wr-share">📤 공유 카드</button>
      <button class="btn btn-primary" data-action="close-modal" style="flex:1">이번 주도 화이팅 🔥</button>
    </div>
  `);
}

        }

        if (st.total > 0 && st.done >= st.total) {
          toast(el.dataset.date === todayStr() ? '오늘 할 일 전부 완료! 🎉' : '이 날의 일정 전부 완료! 🎉');

    case 'cal-today': V.calMonth = monthKeyOf(todayStr()); V.calSel = todayStr(); render(); break;

    case 'goal-nav': V.goalKey[V.goalType] = periodShift(V.goalType, V.goalKey[V.goalType], +el.dataset.d); render(); break;

    case 'hold-sort': V.holdSort = el.dataset.k; render(); break;
    case 'hold-open': V.holdOpen = V.holdOpen === el.dataset.t ? null : el.dataset.t; render(); break;
    case 'new-asset-goal': goalModal(null, { mpreset: 'pf_assets' }); break;
    case 'new-div-goal': goalModal(null, { mpreset: 'pf_div' }); break;

    /* --- 통계/공유 --- */

    case 'open-share': shareModal(); break;
    case 'weekly-report': weeklyReportModal(); break;
    case 'wr-share': closeModal(); shareModal('week'); break;

    /* --- 설정 --- */
    case 'set-theme': S.settings.theme = el.dataset.k; save(); applyTheme(); render(); break;
    case 'set-ws': S.settings.weekStart = +el.dataset.k; save(); render(); break;
    case 'export': exportData(); break;
    case 'import': $('#import-file').click(); break;
    case 'reset': resetAll(); break;
    case 'install':
      if (deferredInstall) { deferredInstall.prompt(); deferredInstall = null; }
      break;
    case 'cloud-login': cloudLogin(); break;
    case 'cloud-logout':
      if (await confirmDlg('로그아웃', '자동 동기화가 꺼져요. 데이터는 이 기기에 그대로 남아요.', { ok: '로그아웃' })) cloudLogout();
      break;

    /* --- 모달 내부 공용(서브태스크/마일스톤 편집) --- */
    case 'modal-sub-add': {
      const box = $('#td-subs');
      box.insertAdjacentHTML('beforeend', subLineHTML());
      box.lastElementChild.querySelector('input').focus();
      break;
    }
    case 'modal-ms-add': {
      const box = $('#gl-ms');
      box.insertAdjacentHTML('beforeend', subLineHTML());
      box.lastElementChild.querySelector('input').focus();
      break;
    }
    case 'modal-sub-toggle': {
      const line = el.closest('.sub-line');
      const on = line.dataset.done !== '1';
      line.dataset.done = on ? '1' : '0';
      line.classList.toggle('on', on);
      break;
    }
    case 'modal-sub-rm': el.closest('.sub-line').remove(); break;

    /* --- 할 일 메뉴 --- */
    case 'menu-edit': closeModal(); todoModal(id); break;
    case 'menu-today': {
      const t = S.todos.find(x => x.id === id);
      if (t) { t.date = todayStr(); save(); }
      closeModal(); render(); toast('오늘로 가져왔어요 📌');
      break;
    }
    case 'menu-tomorrow': {
      const t = S.todos.find(x => x.id === id);
      if (t) {
        t.date = addDays(t.date < todayStr() ? todayStr() : t.date, 1);
        save();
      }
      closeModal(); render(); toast('내일로 미뤘어요 ⏭️');
      break;
    }
    case 'menu-copy': {
      const t = S.todos.find(x => x.id === id);
      if (t) {
        const c = JSON.parse(JSON.stringify(t));
        c.id = uid(); c.done = false; c.doneAt = null; c.createdAt = new Date().toISOString();
        (c.subtasks || []).forEach(s => { s.id = uid(); s.done = false; });
        S.todos.push(c); save();
      }
      closeModal(); render(); toast('복제했어요 📋');
      break;
    }
    case 'menu-del': {
      const t = S.todos.find(x => x.id === id);
      closeModal();
      if (t && await confirmDlg('할 일 삭제', `'${t.title}'을(를) 삭제할까요?`, { danger: true, ok: '삭제' })) {
        S.todos = S.todos.filter(x => x.id !== id);
        save(); render(); toast('삭제했어요');
      }
      break;
    }
  }

function render() {

  });

}
function applyTheme() {

  document.documentElement.dataset.theme = dark ? 'dark' : 'light';
  $('#meta-theme').content = dark ? '#0f1316' : '#f7f8fa';
}

// 모바일 스와이프: 오늘 탭 = 날짜 이동, 달력 탭 = 월 이동 (손가락을 따라오는 자연스러운 드래그)
function slideAnim(dir) {
  const v = document.querySelector('.view.active');
  if (!v) return;
  v.classList.remove('slide-l', 'slide-r');
  void v.offsetWidth;
  v.classList.add(dir > 0 ? 'slide-l' : 'slide-r');
}
const swipeableTab = () => V.tab === 'today' || V.tab === 'calendar';
function swipePeekLabel(dir) {
  if (V.tab === 'today') { const d = parseDate(addDays(V.date, dir)); return `${d.getMonth() + 1}/${d.getDate()} ${KD[d.getDay()]}`; }
  return periodLabel('month', periodShift('month', V.calMonth, dir));
}
function showPeek(dx) {
  const peek = $('#swipe-peek');
  if (Math.abs(dx) < 12) { peek.classList.remove('on'); peek.style.opacity = ''; return; }
  const fromRight = dx < 0;                     // 왼쪽으로 밀면 = 다음 = 오른쪽에서 들어옴
  peek.className = (fromRight ? 'right' : 'left') + ' on';
  peek.textContent = fromRight ? `${swipePeekLabel(1)} ›` : `‹ ${swipePeekLabel(-1)}`;
  peek.style.opacity = String(Math.min(1, Math.abs(dx) / 110));
}
function hidePeek() { const p = $('#swipe-peek'); p.classList.remove('on'); p.style.opacity = ''; }
function commitSwipe(dir) {
  const el = document.querySelector('.view.active');
  if (el) { el.style.transition = ''; el.style.transform = ''; el.style.opacity = ''; }
  if (V.tab === 'today') V.date = addDays(V.date, dir);
  else if (V.tab === 'calendar') V.calMonth = periodShift('month', V.calMonth, dir);
  render();
  slideAnim(dir);
}
let swipe = null;
const mainEl = $('#main');
mainEl.addEventListener('touchstart', e => {
  if (e.touches.length !== 1 || !swipeableTab()) { swipe = null; return; }
  if ($('#modal-root').classList.contains('open')) { swipe = null; return; }
  if (e.target.closest('.heat-wrap, input, textarea, select, [type=range]')) { swipe = null; return; }
  swipe = { x0: e.touches[0].clientX, y0: e.touches[0].clientY, t: Date.now(), dx: 0, active: false, decided: false, el: null };
}, { passive: true });
mainEl.addEventListener('touchmove', e => {
  if (!swipe) return;
  const dx = e.touches[0].clientX - swipe.x0;
  const dy = e.touches[0].clientY - swipe.y0;
  if (!swipe.decided) {
    if (Math.abs(dx) < 8 && Math.abs(dy) < 8) return;   // 방향이 정해질 때까지 대기
    swipe.decided = true;
    swipe.active = Math.abs(dx) > Math.abs(dy) * 1.2;   // 가로 제스처만 채택
    if (swipe.active) { swipe.el = document.querySelector('.view.active'); if (swipe.el) swipe.el.classList.add('dragging'); }
  }
  if (!swipe.active) return;                            // 세로 스크롤은 그대로 둠
  e.preventDefault();
  swipe.dx = dx;
  const ax = Math.abs(dx);
  const damp = (ax > 140 ? 140 + (ax - 140) * 0.35 : ax) * Math.sign(dx);   // 많이 끌수록 저항
  if (swipe.el) {
    swipe.el.style.transform = `translateX(${damp}px)`;
    swipe.el.style.opacity = String(Math.max(0.4, 1 - ax / 620));
  }
  showPeek(dx);
}, { passive: false });
mainEl.addEventListener('touchend', () => {
  if (!swipe) return;
  const s = swipe; swipe = null;
  hidePeek();
  if (!s.active || !s.el) return;
  s.el.classList.remove('dragging');
  const dt = Date.now() - s.t;
  const w = s.el.offsetWidth || window.innerWidth;
  const fling = Math.abs(s.dx) > 40 && dt < 240;                          // 빠른 플릭
  if (Math.abs(s.dx) > Math.min(130, w * 0.30) || fling) {
    const dir = s.dx < 0 ? 1 : -1;
    s.el.style.transition = 'transform .15s ease, opacity .15s ease';
    s.el.style.transform = `translateX(${(dir > 0 ? -1 : 1) * Math.round(w * 0.55)}px)`;
    s.el.style.opacity = '0';
    setTimeout(() => commitSwipe(dir), 140);
  } else {
    const el = s.el;
    el.style.transition = 'transform .22s cubic-bezier(.2,.85,.3,1), opacity .22s ease';
    el.style.transform = 'translateX(0)';
    el.style.opacity = '1';
    setTimeout(() => { el.style.transition = ''; el.style.transform = ''; el.style.opacity = ''; }, 240);
  }
}, { passive: true });
mainEl.addEventListener('touchcancel', () => {
  if (!swipe) return;
  const s = swipe; swipe = null; hidePeek();
  if (s.el) { s.el.classList.remove('dragging'); s.el.style.transition = ''; s.el.style.transform = ''; s.el.style.opacity = ''; }
}, { passive: true });

if (S.settings.assetCur === 'USD' || S.settings.assetCur === 'KRW') V.assetCur = S.settings.assetCur;
applyTheme();
render();
setTimeout(maybeWeeklyReport, 800);
if ('ontouchstart' in window && !localStorage.getItem('dgr_swipe_hint')) {
  setTimeout(() => toast('👈 좌우로 밀면 날짜가 넘어가요 👉'), 900);
  localStorage.setItem('dgr_swipe_hint', '1');
}
if (navigator.storage && navigator.storage.persist) navigator.storage.persist().catch(() => {});
if ('serviceWorker' in navigator && location.protocol.startsWith('http')) {
  navigator.serviceWorker.register('./sw.js').catch(() => {});
}
</script>
<script type="module">
/* Firebase SDK 로더 — 설정이 있을 때만 동작. 실패해도 앱은 로컬 모드로 정상 동작 */
if (window.FIREBASE_CONFIG) {
  (async () => {
    try {
      const V = '10.12.2';
      const [{ initializeApp }, A, F] = await Promise.all([
        import(`https://www.gstatic.com/firebasejs/${V}/firebase-app.js`),
        import(`https://www.gstatic.com/firebasejs/${V}/firebase-auth.js`),
        import(`https://www.gstatic.com/firebasejs/${V}/firebase-firestore.js`)
      ]);
      const app = initializeApp(window.FIREBASE_CONFIG);
      const auth = A.getAuth(app);
      const db = F.initializeFirestore(app, {
        ignoreUndefinedProperties: true,
        localCache: F.persistentLocalCache({ tabManager: F.persistentMultipleTabManager() })
      });
      A.getRedirectResult(auth).catch(e => console.warn('리다이렉트 로그인 결과 처리 실패:', e));
      let unsub = null;
      window.__fbInit({
        onAuth: cb => A.onAuthStateChanged(auth, cb),
        login: () => A.signInWithPopup(auth, new A.GoogleAuthProvider()),
        loginRedirect: () => A.signInWithRedirect(auth, new A.GoogleAuthProvider()),
        logout: () => { if (unsub) { unsub(); unsub = null; } return A.signOut(auth); },
        saveData: (uid, payload) => F.setDoc(F.doc(db, 'users', uid), { ...payload, updatedAt: F.serverTimestamp() }),
        loadData: async uid => { const s = await F.getDoc(F.doc(db, 'users', uid)); return s.exists() ? s.data() : null; },
        listen: (uid, cb) => {
          if (unsub) unsub();
          unsub = F.onSnapshot(F.doc(db, 'users', uid), s => {
            if (s.metadata.hasPendingWrites) return;
            cb(s.exists() ? s.data() : null);
          });
        }
      });
    } catch (e) { console.warn('Firebase 초기화 실패 — 로컬 모드로 동작:', e); }
  })();
}
</script>
